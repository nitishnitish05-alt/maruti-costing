<script>

// ── CATALOGUE PRINT GENERATOR ──────────────────────────────────────
window.__printCatalogue = function() {
  const el = document.getElementById('catalogue-print');
  if(el) { el.remove(); }

  // Get data from Firebase snapshot (already loaded in window.__appData)
  const data = window.__catalogueData;
  if(!data || !data.products || !data.variants) {
    alert('No product data available. Please wait for data to load.');
    return;
  }

  const {products, variants} = data;

  // Group: category → subVariety → products
  const catOrder = ['namkeen','snacks'];
  const grouped = {};
  catOrder.forEach(cat => {
    const catProds = products.filter(p => p.category === cat);
    if(!catProds.length) return;
    grouped[cat] = {};
    catProds.sort((a,b)=>(a.subVariety||'').localeCompare(b.subVariety||'')||a.name.localeCompare(b.name));
    catProds.forEach(p => {
      const sv = p.subVariety || 'General';
      if(!grouped[cat][sv]) grouped[cat][sv] = [];
      grouped[cat][sv].push(p);
    });
  });

  const today = new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'});
  let sno = 1;

  let html = `<div id="catalogue-print" style="font-family:'Nunito',sans-serif;padding:10px;background:#fff;color:#111;">
    <div style="text-align:center;margin-bottom:20px;border-bottom:3px solid #e8851b;padding-bottom:12px;">
      <div style="font-size:26px;font-weight:900;color:#1c1c1c;letter-spacing:0.5px;">Maruti Namkeen Product List</div>
      <div style="font-size:13px;color:#6b7280;margin-top:4px;">Date: ${today}</div>
    </div>`;

  Object.entries(grouped).forEach(([cat, subVars]) => {
    html += `<div style="margin-bottom:18px;">
      <div style="background:#1c1c2e;color:#fff;padding:7px 12px;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:1px;border-radius:4px;margin-bottom:10px;">
        ${cat === 'namkeen' ? '🍘 NAMKEEN' : '🍟 SNACKS'}
      </div>`;

    Object.entries(subVars).forEach(([sv, prods]) => {
      if(sv !== 'General') {
        html += `<div style="background:#fff4e6;color:#c2610a;padding:5px 12px;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;border-left:4px solid #e8851b;margin-bottom:6px;">${sv}</div>`;
      }

      // Table header
      html += `<table style="width:100%;border-collapse:collapse;margin-bottom:10px;font-size:13px;">
        <thead>
          <tr style="background:#f3f4f6;">
            <th style="padding:6px 10px;text-align:center;width:40px;border:1px solid #e5e7eb;font-weight:700;">#</th>
            <th style="padding:6px 10px;text-align:left;border:1px solid #e5e7eb;font-weight:700;">Product Name</th>
            <th style="padding:6px 10px;text-align:center;width:70px;border:1px solid #e5e7eb;font-weight:700;">MRP</th>
            <th style="padding:6px 10px;text-align:center;width:80px;border:1px solid #e5e7eb;font-weight:700;">Fill Wt</th>
            <th style="padding:6px 10px;text-align:center;width:110px;border:1px solid #e5e7eb;font-weight:700;">Pack Size</th>
            <th style="padding:6px 10px;text-align:center;width:90px;border:1px solid #e5e7eb;font-weight:700;">Pcs/Unit</th>
          </tr>
        </thead><tbody>`;

      prods.forEach(p => {
        const pvs = variants.filter(v => v.productId === p.id);
        if(pvs.length === 0) {
          html += `<tr style="background:#fff;">
            <td style="padding:6px 10px;text-align:center;border:1px solid #e5e7eb;color:#9ca3af;">${sno++}</td>
            <td style="padding:6px 10px;border:1px solid #e5e7eb;font-weight:700;">${p.name}</td>
            <td colspan="4" style="padding:6px 10px;text-align:center;border:1px solid #e5e7eb;color:#9ca3af;font-style:italic;">No variants configured</td>
          </tr>`;
        } else {
          pvs.forEach((v, vi) => {
            const packSize = v.packingType === 'box'
              ? (v.carton?.type || 'Box')
              : `${v.primaryBag?.sizeDesc || 'LDPE Bag'} / ${v.masterBag?.sizeDesc || 'Bori'}`;
            const totalPouches = v.packingType === 'box'
              ? (v.carton?.pouchesPerCarton || '—')
              : ((v.primaryBag?.pouchesPerBag || 0) * (v.masterBag?.primaryBagsPerMaster || 0)) || '—';
            const bg = vi % 2 === 0 ? '#fff' : '#fafafa';
            html += `<tr style="background:${bg};">
              ${vi===0 ? `<td style="padding:6px 10px;text-align:center;border:1px solid #e5e7eb;vertical-align:top;" rowspan="${pvs.length}">${sno++}</td>
              <td style="padding:6px 10px;border:1px solid #e5e7eb;font-weight:700;vertical-align:top;" rowspan="${pvs.length}">${p.name}</td>` : ''}
              <td style="padding:6px 10px;text-align:center;border:1px solid #e5e7eb;font-weight:700;">₹${v.mrp}</td>
              <td style="padding:6px 10px;text-align:center;border:1px solid #e5e7eb;">${v.fillWeightG}g</td>
              <td style="padding:6px 10px;text-align:center;border:1px solid #e5e7eb;font-size:11px;">${v.packingType==='box'?'📦':'👜'} ${packSize}</td>
              <td style="padding:6px 10px;text-align:center;border:1px solid #e5e7eb;font-weight:700;">${totalPouches}</td>
            </tr>`;
          });
        }
      });

      html += `</tbody></table>`;
    });
    html += `</div>`;
  });

  html += `<div style="text-align:center;margin-top:20px;padding-top:10px;border-top:1px solid #e5e7eb;font-size:11px;color:#9ca3af;">
    Maruti Namkeen &amp; Snacks &nbsp;·&nbsp; Printed on ${today}
  </div></div>`;

  const div = document.createElement('div');
  div.innerHTML = html;
  document.body.appendChild(div.firstChild);
  setTimeout(()=>window.print(), 200);
};

const today = () => new Date().toISOString().split('T')[0];
const f2 = v => (Number(v)||0).toFixed(2);

// ═══════════════════════════════════════════════════════════════════════════
// CALCULATION ENGINE
// ═══════════════════════════════════════════════════════════════════════════
function calcSubRecipe(sr, rms) {
  if (!sr?.bom?.length || !sr.outputKg) return { costPerKg:0, taxPerKg:0 };
  let cost=0, tax=0;
  for (const item of sr.bom) {
    const rm = rms.find(r=>r.id===item.refId);
    if (rm) {
      cost += num(item.qtyKg) * num(rm.currentRate);
      tax  += num(item.qtyKg) * num(rm.currentRate) * (num(rm.taxPct)/100);
    }
  }
  return { costPerKg: cost/sr.outputKg, taxPerKg: tax/sr.outputKg };
}

function calcProduct(product, rms, subs) {
  if (!product?.bom?.length) return null;
  let bomCost=0, bomTax=0;
  const bomRows = product.bom.map(item => {
    let rate=0, taxRate=0;
    if (item.type==='rm') {
      const rm = rms.find(r=>r.id===item.refId);
      if (rm) { rate=num(rm.currentRate); taxRate=num(rm.currentRate)*num(rm.taxPct)/100; }
    } else {
      const sr = subs.find(s=>s.id===item.refId);
      if (sr) { const c=calcSubRecipe(sr,rms); rate=c.costPerKg; taxRate=c.taxPerKg; }
    }
    const cost=num(item.qtyKg)*rate, taxAmt=num(item.qtyKg)*taxRate;
    bomCost+=cost; bomTax+=taxAmt;
    return {...item, rate, taxRate, cost, taxAmt};
  });
  const out = num(product.batchOutputKg)||1;
  return { bomRows, bomCost, bomTax, namkeenCostPerKg:bomCost/out, namkeenTaxPerKg:bomTax/out };
}

function calcVariant(variant, pc, oh, freightOverride=null, schemeAdd=0) {
  if (!variant||!pc) return null;
  const totalOH = num(oh.labourPerKg)+num(oh.boilerFuelPerKg)+num(oh.electricityPerKg)+num(oh.indirectPerKg);
  const totalCostPerKg = pc.namkeenCostPerKg + totalOH;
  const fillKg = num(variant.fillWeightG)/1000;

  const nmCostPerPouch = totalCostPerKg * fillKg;
  const nmTaxPerPouch  = pc.namkeenTaxPerKg * fillKg;
  const lam = variant.laminate||{};
  const lamCostPerPouch = lam.ratePerKg&&lam.pouchesPerKg ? num(lam.ratePerKg)/num(lam.pouchesPerKg) : 0;
  const lamTaxPerPouch  = lam.ratePerKg&&lam.pouchesPerKg ? (num(lam.ratePerKg)*0.18)/num(lam.pouchesPerKg) : 0;
  const toyCostPerPouch = num(variant.toyCostPerPouch)||0;
  const totalCostPerPouch = nmCostPerPouch + lamCostPerPouch + toyCostPerPouch;
  const totalTaxPerPouch  = nmTaxPerPouch  + lamTaxPerPouch;

  let totalPouches=0, packCost=0, packTax=0;
  if (variant.packingType==='box') {
    const ct = variant.carton||{};
    totalPouches = num(ct.pouchesPerCarton);
    packCost = num(ct.rate);
    packTax  = packCost * 0.05;
  } else {
    const pb=variant.primaryBag||{}, mb=variant.masterBag||{};
    const pbCount = num(mb.primaryBagsPerMaster);
    totalPouches = num(pb.pouchesPerBag) * pbCount;
    const pbCost = num(pb.ratePerBag)*pbCount, mbCost = num(mb.ratePerBag);
    packCost = pbCost+mbCost;
    packTax  = packCost*0.18;
  }

  const pouchCost  = totalCostPerPouch * totalPouches;
  const freight    = freightOverride!==null ? num(freightOverride) : (num(variant.freightLocal)||40);
  const preTaxCost = pouchCost + packCost + freight;
  const inputTax   = totalTaxPerPouch*totalPouches + packTax;
  const outputTax  = preTaxCost * 0.05;
  const netGST     = outputTax - inputTax;
  const netCost    = preTaxCost + netGST;
  const effectiveSP = num(variant.sellingPricePerUnit) - num(variant.scheme) - num(schemeAdd);
  const profit      = effectiveSP - netCost;
  const markupPct   = netCost>0 ? (profit/netCost)*100 : 0;
  const grossPct    = effectiveSP>0 ? (profit/effectiveSP)*100 : 0;

  return {
    totalOH, totalCostPerKg, nmCostPerPouch, lamCostPerPouch, toyCostPerPouch, totalCostPerPouch,
    totalPouches, packCost, packTax, pouchCost, preTaxCost,
    inputTax, outputTax, netGST, netCost,
    effectiveSP, profit, markupPct, grossPct,
    costPerPouch: totalPouches>0 ? netCost/totalPouches : 0,
    freight
  };
}

// FIREBASE HOOKS

function useCol(col) {
  const [data,setData] = useState([]);
  const [loading,setLoading] = useState(true);
  useEffect(()=>{
    return db.collection(col).onSnapshot(snap=>{
      setData(snap.docs.map(d=>({id:d.id,...d.data()})));
      setLoading(false);
    });
  },[col]);
  return [data,loading];
}

function useOverhead() {
  const [oh,setOh] = useState({labourPerKg:0,boilerFuelPerKg:0,electricityPerKg:0,indirectPerKg:0,history:[]});
  useEffect(()=>{
    return db.collection(C.OH).doc('rates').onSnapshot(snap=>{
      if(snap.exists) setOh(snap.data());
    });
  },[]);
  return oh;
}

  const cols = {orange:{bg:'#fef9ec',bdr:'#fcd34d',cl:'#92400e'},blue:{bg:'#eff6ff',bdr:'#bfdbfe',cl:'#1e40af'},purple:{bg:'#faf5ff',bdr:'#e9d5ff',cl:'#6b21a8'}};

  return <div style={{background:c.bg,border:`1px solid ${c.bdr}`,borderRadius:'8px',padding:'9px 12px',fontSize:'12px',color:c.cl}}>{children}</div>;

const Row2 = ({children}) => <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>{children}</div>;

// BOM BUILDER — shared by sub-recipes and products
// ═══════════════════════════════════════════════════════════════════════════
function BOMBuilder({bom,onChange,rms,subs=[],allowSubs=true}) {
  const [addType,setAddType]   = useState('rm');
  const [addRefId,setAddRefId] = useState('');
  const [addRefNm,setAddRefNm] = useState('');
  const [addQty,setAddQty]     = useState('');

  const getRate = (type,refId) => {
    if(type==='rm'){const rm=rms.find(r=>r.id===refId);return rm?num(rm.currentRate):0;}
    const sr=subs.find(s=>s.id===refId);return sr?calcSubRecipe(sr,rms).costPerKg:0;
  };

  const totalCost = bom.reduce((s,i)=>s+num(i.qtyKg)*getRate(i.type,i.refId),0);

  const handleAdd = () => {
    if(!addRefId||!addQty||!addRefNm) return;
    onChange([...bom,{type:addType,refId:addRefId,refName:addRefNm,qtyKg:num(addQty),_id:Date.now()+''}]);
    setAddRefId(''); setAddRefNm(''); setAddQty('');
  };
  const rmItem = idx => onChange(bom.filter((_,i)=>i!==idx));
  const chgQty = (idx,v) => onChange(bom.map((it,i)=>i===idx?{...it,qtyKg:num(v)}:it));

  const rmOpts = rms.map(r=>({v:r.id,l:`${r.name} (₹${r.currentRate}/kg)`}));
  const srOpts = subs.map(s=>{const c=calcSubRecipe(s,rms);return {v:s.id,l:`${s.name} (₹${f2(c.costPerKg)}/kg)`};});

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
      {bom.length>0&&(
        <div style={{borderRadius:'10px',overflow:'hidden',border:'1.5px solid #e5e7eb'}}>
          {bom.map((item,idx)=>{
            const rate=getRate(item.type,item.refId);
            const cost=num(item.qtyKg)*rate;
            return (
              <div key={item._id||idx} style={{display:'grid',gridTemplateColumns:'1fr 72px 68px 26px',padding:'8px 10px',borderTop:idx>0?'1px solid #f3f4f6':'none',background:idx%2===0?'#fff':'#fafafa',alignItems:'center',gap:'6px'}}>
                <div>
                  <div style={{fontWeight:'600',fontSize:'12px'}}>{item.refName}</div>
                  <div style={{fontSize:'10px',color:item.type==='sub'?'#7c3aed':'#0369a1'}}>{item.type==='sub'?'PROC':'RAW'} · ₹{f2(rate)}/kg</div>
                </div>
                <input type="number" value={item.qtyKg} onChange={e=>chgQty(idx,e.target.value)}
                  style={{border:'1.5px solid #e5e7eb',borderRadius:'6px',padding:'4px 6px',fontSize:'12px',textAlign:'right',width:'100%',fontFamily:'JetBrains Mono,monospace'}} />
                <div style={{textAlign:'right',fontFamily:'JetBrains Mono,monospace',fontSize:'12px',fontWeight:'600'}}>₹{f2(cost)}</div>
                <button onClick={()=>rmItem(idx)} style={{background:'#fee2e2',border:'none',borderRadius:'5px',color:'#dc2626',cursor:'pointer',fontWeight:'700',fontSize:'15px',width:'22px',height:'22px',lineHeight:'1'}}>×</button>
              </div>
            );
          })}
          <div style={{display:'flex',justifyContent:'space-between',padding:'8px 10px',background:'#fff9f0',borderTop:'2px solid #e8851b'}}>
            <span style={{fontWeight:'700',fontSize:'12px',color:'#c2610a'}}>Total Batch Cost</span>
            <span style={{fontFamily:'JetBrains Mono,monospace',fontWeight:'700',color:'#c2610a'}}>₹{f2(totalCost)}</span>
          </div>
        </div>
      )}
      <div style={{background:'#f9fafb',borderRadius:'10px',padding:'12px',display:'flex',flexDirection:'column',gap:'8px'}}>
        <div style={{fontSize:'10px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase'}}>+ Add Item to BOM</div>
        {allowSubs&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}}>
            {['rm','sub'].map(t=>(
              <button key={t} onClick={()=>{setAddType(t);setAddRefId('');setAddRefNm('');}}
                style={{padding:'7px',borderRadius:'7px',border:'none',cursor:'pointer',fontWeight:'700',fontSize:'11px',fontFamily:'Nunito,sans-serif',background:addType===t?'#e8851b':'#e5e7eb',color:addType===t?'#fff':'#6b7280'}}>
                {t==='rm'?'🌾 Raw Material':'⚙️ Sub-Recipe'}
              </button>
            ))}
          </div>
        )}
        <select value={addRefId} onChange={e=>{
          const opts=addType==='rm'?rmOpts:srOpts;
          const opt=opts.find(o=>o.v===e.target.value);
          setAddRefId(e.target.value);
          setAddRefNm(opt?opt.l.split(' (')[0]:'');
        }} style={{border:'1.5px solid #e5e7eb',borderRadius:'8px',padding:'8px 10px',fontSize:'13px',background:'#fff'}}>
          <option value="">Select {addType==='rm'?'ingredient':'sub-recipe'}...</option>
          {(addType==='rm'?rmOpts:srOpts).map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
        </select>
        <div style={{display:'flex',gap:'8px',alignItems:'flex-end'}}>
          <Inp label="Qty (kg)" value={addQty} onChange={setAddQty} type="number" style={{flex:1}} />
          <Btn onClick={handleAdd} disabled={!addRefId||!addQty}>Add</Btn>
        </div>
      </div>
    </div>
  );
}

function RMForm({rm,onDone}) {
  const [name,setName]=useState(rm?.name||'');
  const [rate,setRate]=useState(rm?.currentRate||'');
  const [tax,setTax]=useState(rm?.taxPct??'');
  const [busy,setBusy]=useState(false);

  const save = async()=>{
    if(!name||rate===''){return;}
    setBusy(true);
    try{
      if(rm){
        const rateChanged=num(rate)!==rm.currentRate;
        await db.collection(C.RM).doc(rm.id).update({
          name, currentRate:num(rate), taxPct:num(tax),
          ...(rateChanged&&{rateHistory:FV.arrayUnion({rate:num(rate),date:today()})})
        });
      } else {
        await db.collection(C.RM).add({name,currentRate:num(rate),taxPct:num(tax),rateHistory:[{rate:num(rate),date:today()}]});
      }
      onDone();
    } finally{setBusy(false);}
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
      <Inp label="Ingredient Name" value={name} onChange={setName} req />
      <Row2>
        <Inp label="Rate ₹/kg" value={rate} onChange={setRate} type="number" req />
        <Inp label="GST %" value={tax} onChange={setTax} type="number" placeholder="0" />
      </Row2>
      <Row2>
        <Btn v="secondary" onClick={onDone} full>Cancel</Btn>
        <Btn onClick={save} disabled={busy} full>{busy?'Saving…':rm?'Update':'Add Ingredient'}</Btn>
      </Row2>
    </div>
  );
}

// BULK ENTRY — spreadsheet style, all rows at once
function BulkRMEntry({existingNames, onDone}) {
  const EMPTY = () => ({name:'',rate:'',tax:'0',_id:Date.now()+Math.random()});
  const [rows,setRows] = useState(()=>[...PRESET_RMS.map(p=>({...p,tax:String(p.tax),_id:Math.random()})),...Array(5).fill(null).map(EMPTY)]);
  const [busy,setBusy] = useState(false);
  const [progress,setProgress] = useState('');

  const addRows = n => setRows(r=>[...r,...Array(n).fill(null).map(EMPTY)]);
  const updRow = (idx,field,val) => setRows(r=>r.map((row,i)=>i===idx?{...row,[field]:val}:row));
  const delRow = idx => setRows(r=>r.filter((_,i)=>i!==idx));

  const validRows = rows.filter(r=>r.name.trim()&&r.rate!=='');

  const saveAll = async()=>{
    if(!validRows.length) return;
    setBusy(true);
    try{
      const batch = db.batch();
      let count=0;
      for(const row of validRows){
        const nm = row.name.trim();
        if(existingNames.includes(nm.toLowerCase())) continue; // skip duplicates
        const ref = db.collection(C.RM).doc();
        batch.set(ref,{name:nm,currentRate:num(row.rate),taxPct:num(row.tax)||0,rateHistory:[{rate:num(row.rate),date:today()}]});
        count++;
        if(count%400===0){ await batch.commit(); setProgress(`Saved ${count}…`); }
      }
      await batch.commit();
      setProgress(`✅ ${count} ingredients saved!`);
      setTimeout(onDone, 1200);
    } catch(e){setProgress('Error: '+e.message);}
    finally{setBusy(false);}
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
      <InfoBox>📋 All 65 common namkeen ingredients are pre-loaded below. Update rates to match your current prices, remove what you don't use, add anything extra. Then click Save All.</InfoBox>
      <div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>
        <div style={{fontSize:'12px',color:'#6b7280'}}><strong>{validRows.length}</strong> valid rows ready</div>
        <Btn sm v="secondary" onClick={()=>addRows(5)}>+ 5 rows</Btn>
        <Btn sm v="secondary" onClick={()=>addRows(10)}>+ 10 rows</Btn>
      </div>

      {/* Sticky header */}
      <div style={{borderRadius:'10px',overflow:'hidden',border:'1.5px solid #e5e7eb'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 90px 70px 28px',background:'#e8851b',padding:'8px 10px',gap:'6px',position:'sticky',top:0,zIndex:2}}>
          {['Ingredient Name','Rate ₹/kg','GST %',''].map(h=>(
            <div key={h} style={{fontSize:'10px',fontWeight:'700',color:'#fff'}}>{h}</div>
          ))}
        </div>
        <div style={{maxHeight:'55vh',overflowY:'auto'}}>
          {rows.map((row,idx)=>(
            <div key={row._id} style={{display:'grid',gridTemplateColumns:'1fr 90px 70px 28px',padding:'5px 8px',borderTop:'1px solid #f3f4f6',background:idx%2===0?'#fff':'#fafafa',gap:'6px',alignItems:'center'}}>
              <input value={row.name} onChange={e=>updRow(idx,'name',e.target.value)}
                placeholder={`Ingredient ${idx+1}`}
                style={{border:'1px solid #e5e7eb',borderRadius:'6px',padding:'6px 8px',fontSize:'12px',width:'100%'}} />
              <input type="number" value={row.rate} onChange={e=>updRow(idx,'rate',e.target.value)}
                placeholder="₹/kg"
                style={{border:'1px solid #e5e7eb',borderRadius:'6px',padding:'6px 8px',fontSize:'12px',width:'100%',textAlign:'right',fontFamily:'JetBrains Mono,monospace'}} />
              <select value={row.tax} onChange={e=>updRow(idx,'tax',e.target.value)}
                style={{border:'1px solid #e5e7eb',borderRadius:'6px',padding:'6px 4px',fontSize:'12px',background:'#fff',width:'100%'}}>
                {['0','5','12','18','28'].map(t=><option key={t} value={t}>{t}%</option>)}
              </select>
              <button onClick={()=>delRow(idx)}
                style={{background:'#fee2e2',border:'none',borderRadius:'5px',color:'#dc2626',cursor:'pointer',fontWeight:'700',fontSize:'14px',width:'22px',height:'22px',lineHeight:'1'}}>×</button>
            </div>
          ))}
        </div>
      </div>

      {progress&&<div style={{textAlign:'center',fontWeight:'700',color:'#e8851b',fontSize:'13px'}}>{progress}</div>}

      <div style={{display:'flex',gap:'8px',position:'sticky',bottom:0,background:'#fff',padding:'8px 0'}}>
        <Btn v="secondary" onClick={onDone} full>Cancel</Btn>
        <Btn onClick={saveAll} disabled={busy||!validRows.length} full>
          {busy?`Saving ${validRows.length} items…`:`💾 Save All (${validRows.length} items)`}
        </Btn>
      </div>
    </div>
  );
}

function SRForm({sr,rms,onDone}) {
  const [name,setName]=useState(sr?.name||'');
  const [type,setType]=useState(sr?.type||'frying');
  const [bom,setBom]=useState(sr?.bom||[]);
  const [outKg,setOutKg]=useState(sr?.outputKg||'');
  const [busy,setBusy]=useState(false);

  const inKg = bom.reduce((s,i)=>s+num(i.qtyKg),0);
  const yldPct = outKg>0&&inKg>0?((outKg/inKg)*100).toFixed(1):'-';
  const {costPerKg,taxPerKg} = outKg>0?calcSubRecipe({bom,outputKg:num(outKg)},rms):{costPerKg:0,taxPerKg:0};

  const save = async()=>{
    if(!name||!outKg||!bom.length) return;
    setBusy(true);
    try{
      const d={name,type,bom,inputKg:inKg,outputKg:num(outKg),yieldPct:num(yldPct)||0};
      if(sr) await db.collection(C.SUB).doc(sr.id).update(d);
      else await db.collection(C.SUB).add(d);
      onDone();
    } finally{setBusy(false);}
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
      <Inp label="Sub-Recipe Name" value={name} onChange={setName} req placeholder="e.g. Masoor Bhujia" />
      <Sel label="Process Type" value={type} onChange={setType} opts={[{v:'frying',l:'🔥 Frying'},{v:'extrusion',l:'⚙️ Extrusion (Sev/Gathiya machine)'},{v:'blending',l:'🥣 Blending / Masala Mix'},{v:'roasting',l:'♨️ Roasting'}]} />
      <div>
        <div style={{fontSize:'10px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'8px'}}>Bill of Materials (Inputs) *</div>
        <BOMBuilder bom={bom} onChange={setBom} rms={rms} allowSubs={false} />
      </div>
      <Row2>
        <div style={{background:'#f9fafb',borderRadius:'8px',padding:'10px',textAlign:'center'}}>
          <div style={{fontSize:'10px',color:'#9ca3af',marginBottom:'2px'}}>Total Input (kg)</div>
          <div style={{fontWeight:'700',fontFamily:'JetBrains Mono,monospace'}}>{f2(inKg)}</div>
        </div>
        <Inp label="Output / Yield (kg) *" value={outKg} onChange={setOutKg} type="number" req />
      </Row2>
      {outKg>0&&inKg>0&&(
        <div style={{background:'#fff4e6',border:'1px solid #fed7aa',borderRadius:'10px',padding:'12px'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',textAlign:'center'}}>
            {[{l:'Yield %',v:`${yldPct}%`},{l:'Cost/kg',v:`₹${f2(costPerKg)}`},{l:'Tax/kg',v:`₹${f2(taxPerKg)}`}].map(x=>(
              <div key={x.l}>
                <div style={{fontSize:'10px',color:'#374151'}}>{x.l}</div>
                <div style={{fontWeight:'800',fontSize:'14px',color:'#c2610a',fontFamily:'JetBrains Mono,monospace'}}>{x.v}</div>
              </div>
            ))}
          </div>
        </div>
      )}
      <Row2>
        <Btn v="secondary" onClick={onDone} full>Cancel</Btn>
        <Btn onClick={save} disabled={busy} full>{busy?'Saving…':sr?'Update':'Create'}</Btn>
      </Row2>
    </div>
  );
}

function SubRecipes({subs,rms}) {
  const [q,setQ]=useState('');
  const [form,setForm]=useState(false);
  const [edit,setEdit]=useState(null);
  const filtered=subs.filter(s=>s.name.toLowerCase().includes(q.toLowerCase()));
  const del=async s=>{if(confirm(`Delete "${s.name}"?`)) await db.collection(C.SUB).doc(s.id).delete();};

  return (
    <div style={{padding:'16px',display:'flex',flexDirection:'column',gap:'12px'}}>
      <SecHdr title={`Sub-Recipes (${subs.length})`} action={<Btn sm onClick={()=>{setEdit(null);setForm(true);}}>+ Add</Btn>} />
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search sub-recipes…"
        style={{border:'1.5px solid #e5e7eb',borderRadius:'10px',padding:'10px 14px',fontSize:'13px',width:'100%'}} />
      <InfoBox>⚙️ Sub-recipes are processed intermediates — bhujia, sev, masala mixes, fried dals. Enter input ingredients and output yield. Cost/kg auto-cascades from RM rates.</InfoBox>
      {filtered.length===0?<Empty icon="⚙️" text="No sub-recipes yet." />:filtered.map(sr=>{
        const {costPerKg,taxPerKg}=calcSubRecipe(sr,rms);
        return (
          <Card key={sr.id}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px'}}>
              <div>
                <div style={{fontWeight:'800',fontSize:'14px'}}>{sr.name}</div>
                <div style={{fontSize:'11px',color:'#9ca3af',marginTop:'2px',textTransform:'uppercase'}}>{sr.type} · Yield {f1(sr.yieldPct)}%</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:'JetBrains Mono,monospace',fontWeight:'800',fontSize:'16px',color:'#e8851b'}}>₹{f2(costPerKg)}</div>
                <div style={{fontSize:'10px',color:'#9ca3af'}}>per kg</div>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'6px',marginBottom:'10px'}}>
              {[{l:'Input',v:`${f2(sr.inputKg)} kg`},{l:'Output',v:`${f2(sr.outputKg)} kg`},{l:'Input Tax/kg',v:`₹${f2(taxPerKg)}`}].map(x=>(
                <div key={x.l} style={{background:'#f9fafb',borderRadius:'8px',padding:'6px',textAlign:'center'}}>
                  <div style={{fontSize:'10px',color:'#9ca3af'}}>{x.l}</div>
                  <div style={{fontWeight:'700',fontSize:'12px',fontFamily:'JetBrains Mono,monospace'}}>{x.v}</div>
                </div>
              ))}
            </div>
            <div style={{fontSize:'11px',color:'#9ca3af',marginBottom:'8px',lineHeight:'1.5'}}>
              {(sr.bom||[]).map(b=>`${b.refName} (${b.qtyKg}kg)`).join(' + ')}
            </div>
            <div style={{display:'flex',gap:'6px'}}>
              <Btn sm v="secondary" onClick={()=>{setEdit(sr);setForm(true);}} style={{flex:1}}>✏️ Edit</Btn>
              <Btn sm v="danger" onClick={()=>del(sr)}>🗑</Btn>
            </div>
          </Card>
        );
      })}
      {form&&<Modal title={edit?'Edit Sub-Recipe':'New Sub-Recipe'} onClose={()=>setForm(false)}><SRForm sr={edit} rms={rms} onDone={()=>setForm(false)} /></Modal>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// PACK VARIANT FORM
// ═══════════════════════════════════════════════════════════════════════════
function VarForm({v:vt,productId,productName,onDone}) {
  const [mrp,setMrp]=useState(vt?.mrp||'');
  const [pt,setPt]=useState(vt?.packingType||'box');
  const [fw,setFw]=useState(vt?.fillWeightG||'');
  const [lamSz,setLamSz]=useState(vt?.laminate?.sizeDesc||'');
  const [lamRt,setLamRt]=useState(vt?.laminate?.ratePerKg||'');
  const [lamPk,setLamPk]=useState(vt?.laminate?.pouchesPerKg||'');
  const [ctType,setCtType]=useState(vt?.carton?.type||'Duplex Printed');
  const [ctRt,setCtRt]=useState(vt?.carton?.rate||'');
  const [ctPk,setCtPk]=useState(vt?.carton?.pouchesPerCarton||'');
  const [pbSz,setPbSz]=useState(vt?.primaryBag?.sizeDesc||'');
  const [pbRt,setPbRt]=useState(vt?.primaryBag?.ratePerBag||'');
  const [pbPk,setPbPk]=useState(vt?.primaryBag?.pouchesPerBag||'');
  const [mbSz,setMbSz]=useState(vt?.masterBag?.sizeDesc||'');
  const [mbRt,setMbRt]=useState(vt?.masterBag?.ratePerBag||'');
  const [mbCt,setMbCt]=useState(vt?.masterBag?.primaryBagsPerMaster||'');
  const [sp,setSp]=useState(vt?.sellingPricePerUnit||'');
  const [sch,setSch]=useState(vt?.scheme||'');
  const [frL,setFrL]=useState(vt?.freightLocal||40);
  const [frO,setFrO]=useState(vt?.freightOutstation||'');
  const [toy,setToy]=useState(vt?.toyCostPerPouch||'');
  // Laminate structure calculator states
  const [showLamCalc,setShowLamCalc]=useState(false);
  const [lcW,setLcW]=useState('');
  const [lcH,setLcH]=useState('');
  const [lcLayers,setLcLayers]=useState(3);
  const [lcMics,setLcMics]=useState(['12','12','20','']);
  const [lcMats,setLcMats]=useState(['pet','metpet','ldpe','ldpe']);
  const [busy,setBusy]=useState(false);

  const totalPouches = pt==='box'?num(ctPk):num(pbPk)*num(mbCt);

  const MATS_DB = {
    pet:     {label:'PET (Polyester)',       density:1.390},
    metpet:  {label:'MET PET (Metallised)',  density:1.390},
    ldpe:    {label:'LDPE / PE (Sealing)',   density:0.925},
    bopp:    {label:'BOPP',                  density:0.910},
    metbopp: {label:'MET BOPP',              density:0.910},
    cpp:     {label:'CPP',                   density:0.910},
  };
  const updMic=(i,v)=>setLcMics(prev=>{const a=[...prev];a[i]=v;return a;});
  const updMat=(i,v)=>setLcMats(prev=>{const a=[...prev];a[i]=v;return a;});
  const lcCalc=(()=>{
    const w=num(lcW),h=num(lcH);
    if(!w||!h) return null;
    let layerGSM=0;
    for(let i=0;i<lcLayers;i++) layerGSM+=num(lcMics[i])*(MATS_DB[lcMats[i]]?.density||1.39);
    const bonds=lcLayers-1;
    const compositeGSM=layerGSM+bonds*2+2;
    const areaM2=(w/1000)*(h/1000);
    const pouchWeightG=compositeGSM*areaM2;
    const pouchesPerKg=pouchWeightG>0?Math.round(1000/pouchWeightG):0;
    return {compositeGSM,pouchWeightG,pouchesPerKg};
  })();

  const save = async()=>{
    if(!mrp||!fw||!sp) return;
    setBusy(true);
    try{
      const d={
        productId, productName, mrp:num(mrp), packingType:pt, fillWeightG:num(fw),
        laminate:{sizeDesc:lamSz,ratePerKg:num(lamRt),pouchesPerKg:num(lamPk)},
        sellingPricePerUnit:num(sp), scheme:num(sch)||0,
        freightLocal:num(frL)||40, freightOutstation:num(frO)||60,
        toyCostPerPouch:num(toy)||0,
        ...(pt==='box'?{
          carton:{type:ctType,rate:num(ctRt),taxPct:5,pouchesPerCarton:num(ctPk)},
          primaryBag:null, masterBag:null
        }:{
          primaryBag:{sizeDesc:pbSz,ratePerBag:num(pbRt),pouchesPerBag:num(pbPk)},
          masterBag:{sizeDesc:mbSz,ratePerBag:num(mbRt),primaryBagsPerMaster:num(mbCt)},
          carton:null
        })
      };
      if(vt) await db.collection(C.VAR).doc(vt.id).update(d);
      else await db.collection(C.VAR).add(d);
      onDone();
    } finally{setBusy(false);}
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
      <Row2>
        <Inp label="MRP ₹/pouch" value={mrp} onChange={setMrp} type="number" req />
        <Inp label="Fill Weight (g)" value={fw} onChange={setFw} type="number" req />
      </Row2>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}}>
        {['box','bag'].map(t=>(
          <button key={t} onClick={()=>setPt(t)}
            style={{padding:'10px',borderRadius:'8px',border:'none',cursor:'pointer',fontWeight:'700',fontSize:'12px',fontFamily:'Nunito,sans-serif',background:pt===t?'#e8851b':'#f3f4f6',color:pt===t?'#fff':'#6b7280'}}>
            {t==='box'?'📦 Box / Carton':'👜 Bag / Bori'}
          </button>
        ))}
      </div>

      {/* Laminate */}
      <div style={{background:'#f9fafb',borderRadius:'10px',padding:'12px',display:'flex',flexDirection:'column',gap:'10px'}}>
        <div style={{fontSize:'10px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase'}}>🎁 Laminate Pouch (18% GST)</div>
        <Inp label="Pouch Size Description (e.g. 240×150mm)" value={lamSz} onChange={setLamSz} />
        <Row2>
          <Inp label="Rate ₹/kg" value={lamRt} onChange={setLamRt} type="number" />
          <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <label style={{fontSize:'10px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.8px'}}>Pouches per kg</label>
              <button onClick={()=>setShowLamCalc(s=>!s)} style={{fontSize:'10px',fontWeight:'700',background:showLamCalc?'#e8851b':'#f3f4f6',color:showLamCalc?'#fff':'#e8851b',border:'none',borderRadius:'5px',padding:'2px 7px',cursor:'pointer',fontFamily:'Nunito,sans-serif'}}>
                🧮 {showLamCalc?'Hide':'Calculate'}
              </button>
            </div>
            <input type="number" value={lamPk} onChange={e=>setLamPk(e.target.value)} placeholder="e.g. 480"
              style={{border:'1.5px solid #e5e7eb',borderRadius:'8px',padding:'9px 12px',fontSize:'13px',width:'100%',background:'#fff'}} />
          </div>
        </Row2>
        {showLamCalc&&(
          <div style={{background:'#1c1c2e',borderRadius:'10px',padding:'12px',display:'flex',flexDirection:'column',gap:'10px'}}>
            <div style={{fontSize:'11px',fontWeight:'800',color:'#a78bfa',letterSpacing:'1px',textTransform:'uppercase'}}>🧮 Structure Calculator</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>
              <div style={{display:'flex',flexDirection:'column',gap:'3px'}}>
                <label style={{fontSize:'10px',fontWeight:'700',color:'rgba(255,255,255,0.6)',textTransform:'uppercase'}}>Width (mm)</label>
                <input type="number" value={lcW} onChange={e=>setLcW(e.target.value)} placeholder="e.g. 240"
                  style={{border:'1px solid #374151',borderRadius:'6px',padding:'7px 10px',fontSize:'13px',background:'#2d2d44',color:'#f3f4f6',fontFamily:'JetBrains Mono,monospace'}} />
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:'3px'}}>
                <label style={{fontSize:'10px',fontWeight:'700',color:'rgba(255,255,255,0.6)',textTransform:'uppercase'}}>Height (mm)</label>
                <input type="number" value={lcH} onChange={e=>setLcH(e.target.value)} placeholder="e.g. 150"
                  style={{border:'1px solid #374151',borderRadius:'6px',padding:'7px 10px',fontSize:'13px',background:'#2d2d44',color:'#f3f4f6',fontFamily:'JetBrains Mono,monospace'}} />
              </div>
            </div>
            <div>
              <label style={{fontSize:'10px',fontWeight:'700',color:'rgba(255,255,255,0.6)',textTransform:'uppercase',display:'block',marginBottom:'5px'}}>Number of Layers</label>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'5px'}}>
                {[2,3,4].map(n=>(
                  <button key={n} onClick={()=>setLcLayers(n)} style={{padding:'7px',borderRadius:'6px',border:'none',cursor:'pointer',fontWeight:'700',fontSize:'12px',fontFamily:'Nunito,sans-serif',background:lcLayers===n?'#a78bfa':'#374151',color:'#fff'}}>{n}-Layer</button>
                ))}
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 60px',gap:'6px'}}>
                {['Layer','Material','μ'].map(h=><div key={h} style={{fontSize:'10px',fontWeight:'700',color:'rgba(255,255,255,0.5)',textTransform:'uppercase'}}>{h}</div>)}
              </div>
              {Array.from({length:lcLayers},(_,i)=>(
                <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 1fr 60px',gap:'6px',alignItems:'center'}}>
                  <div style={{fontSize:'11px',color:'rgba(255,255,255,0.7)',fontWeight:'600'}}>{i===0?'Outer (Print)':i===lcLayers-1?'Inner (Seal)':`Layer ${i+1}`}</div>
                  <select value={lcMats[i]||'pet'} onChange={e=>updMat(i,e.target.value)}
                    style={{border:'1px solid #374151',borderRadius:'6px',padding:'5px 6px',fontSize:'11px',background:'#2d2d44',color:'#f3f4f6'}}>
                    {Object.entries(MATS_DB).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                  </select>
                  <input type="number" value={lcMics[i]||''} onChange={e=>updMic(i,e.target.value)} placeholder="μ"
                    style={{border:'1px solid #374151',borderRadius:'6px',padding:'5px 8px',fontSize:'12px',background:'#2d2d44',color:'#f3f4f6',fontFamily:'JetBrains Mono,monospace',textAlign:'center',width:'100%'}} />
                </div>
              ))}
            </div>
            <div style={{fontSize:'10px',color:'rgba(255,255,255,0.4)',borderTop:'1px solid #374151',paddingTop:'7px'}}>Fixed: Adhesive {(lcLayers-1)*2} GSM · Ink 2 GSM</div>
            {lcCalc&&lcCalc.pouchesPerKg>0&&(
              <div style={{background:'#2d2d44',borderRadius:'8px',padding:'10px'}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'6px',textAlign:'center',marginBottom:'10px'}}>
                  {[{l:'Composite GSM',v:`${f2(lcCalc.compositeGSM)}`},{l:'Pouch Weight',v:`${f2(lcCalc.pouchWeightG)}g`},{l:'Pouches/kg',v:`${lcCalc.pouchesPerKg}`}].map(x=>(
                    <div key={x.l}>
                      <div style={{fontSize:'9px',color:'rgba(255,255,255,0.5)',marginBottom:'2px',textTransform:'uppercase'}}>{x.l}</div>
                      <div style={{fontFamily:'JetBrains Mono,monospace',fontWeight:'800',fontSize:'14px',color:'#a78bfa'}}>{x.v}</div>
                    </div>
                  ))}
                </div>
                <button onClick={()=>{setLamPk(String(lcCalc.pouchesPerKg));setShowLamCalc(false);}}
                  style={{width:'100%',background:'#a78bfa',color:'#fff',border:'none',borderRadius:'7px',padding:'9px',fontWeight:'800',fontSize:'13px',cursor:'pointer',fontFamily:'Nunito,sans-serif'}}>
                  ✓ Use {lcCalc.pouchesPerKg} pouches/kg
                </button>
              </div>
            )}
            {(!lcW||!lcH)&&<div style={{fontSize:'11px',color:'rgba(255,255,255,0.4)',textAlign:'center'}}>Enter width and height to calculate</div>}
          </div>
        )}
        {lamRt&&lamPk&&<InfoBox color="orange">Cost/pouch: ₹{f2(lamRt/lamPk)} · Tax input: ₹{f2((lamRt*0.18)/lamPk)}/pouch</InfoBox>}
      </div>

      {/* Box or Bag */}
      {pt==='box'?(
        <div style={{background:'#eff6ff',borderRadius:'10px',padding:'12px',display:'flex',flexDirection:'column',gap:'10px'}}>
          <div style={{fontSize:'10px',fontWeight:'700',color:'#1d4ed8',textTransform:'uppercase'}}>📦 Carton (5% GST)</div>
          <Sel label="Carton Type" value={ctType} onChange={setCtType} opts={[{v:'Duplex Printed',l:'Duplex Printed'},{v:'Kraft',l:'Kraft Box'}]} />
          <Row2>
            <Inp label="Rate ₹/carton" value={ctRt} onChange={setCtRt} type="number" />
            <Inp label="Pouches per carton" value={ctPk} onChange={setCtPk} type="number" />
          </Row2>
          {ctPk&&<InfoBox color="blue">1 carton = {ctPk} pouches</InfoBox>}
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
          <div style={{background:'#faf5ff',borderRadius:'10px',padding:'12px',display:'flex',flexDirection:'column',gap:'10px'}}>
            <div style={{fontSize:'10px',fontWeight:'700',color:'#7c3aed',textTransform:'uppercase'}}>👜 Primary LDPE Bag (18% GST)</div>
            <Inp label="Bag Size (e.g. 12×16 inch)" value={pbSz} onChange={setPbSz} />
            <Row2>
              <Inp label="Rate ₹/bag" value={pbRt} onChange={setPbRt} type="number" />
              <Inp label="Pouches per bag" value={pbPk} onChange={setPbPk} type="number" />
            </Row2>
          </div>
          <div style={{background:'#faf5ff',borderRadius:'10px',padding:'12px',display:'flex',flexDirection:'column',gap:'10px'}}>
            <div style={{fontSize:'10px',fontWeight:'700',color:'#7c3aed',textTransform:'uppercase'}}>📦 Master Bori (18% GST)</div>
            <Inp label="Bori Size (e.g. 30×38 inch)" value={mbSz} onChange={setMbSz} />
            <Row2>
              <Inp label="Rate ₹/bori" value={mbRt} onChange={setMbRt} type="number" />
              <Inp label="LDPE bags per bori" value={mbCt} onChange={setMbCt} type="number" />
            </Row2>
            {totalPouches>0&&<InfoBox color="purple">1 bori = {mbCt} bags × {pbPk} pouches = <strong>{totalPouches} pouches</strong></InfoBox>}
          </div>
        </div>
      )}

      {/* Pricing */}
      <div style={{background:'#f9fafb',borderRadius:'10px',padding:'12px',display:'flex',flexDirection:'column',gap:'10px'}}>
        <div style={{fontSize:'10px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase'}}>💰 Pricing</div>
        <Row2>
          <Inp label="Selling Price ₹/unit" value={sp} onChange={setSp} type="number" req />
          <Inp label="Scheme ₹/unit" value={sch} onChange={setSch} type="number" />
        </Row2>
        <Row2>
          <Inp label="Freight Local ₹" value={frL} onChange={setFrL} type="number" />
          <Inp label="Freight Outstation ₹" value={frO} onChange={setFrO} type="number" />
        </Row2>
        <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:'8px',padding:'10px 12px',display:'flex',flexDirection:'column',gap:'8px'}}>
          <div style={{fontSize:'10px',fontWeight:'700',color:'#166534',textTransform:'uppercase',letterSpacing:'0.8px'}}>🧸 Toy / Insert (Optional)</div>
          <Row2>
            <Inp label="Toy Cost ₹/pouch" value={toy} onChange={setToy} type="number" placeholder="0" />
            <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
              <label style={{fontSize:'10px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.8px'}}>Total Toy Cost / Unit</label>
              <div style={{border:'1.5px solid #e5e7eb',borderRadius:'8px',padding:'9px 12px',fontSize:'13px',background:'#f9fafb',fontFamily:'JetBrains Mono,monospace',fontWeight:'700',color:'#166534'}}>
                {toy?`₹${(num(toy)*(pt==='box'?num(ctPk):num(pbPk)*num(mbCt))).toFixed(2)}`:'—'}
              </div>
            </div>
          </Row2>
        </div>
      </div>

      <Row2>
        <Btn v="secondary" onClick={onDone} full>Cancel</Btn>
        <Btn onClick={save} disabled={busy} full>{busy?'Saving…':vt?'Update Variant':'Add Variant'}</Btn>
      </Row2>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// VARIANT DETAIL BREAKDOWN
// ═══════════════════════════════════════════════════════════════════════════
function VarDetail({variant, pc, oh, freightOverride=null}) {
  const c = calcVariant(variant, pc, oh, freightOverride);
  if(!c) return null;
  const border='#e8ddd0',text1='#111111',text2='#374151',text3='#6b7280',orange='#e8851b';
  const Row=({label,val,note,bold,color,topBdr})=>(
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
      padding:'9px 14px',background:bold?'#fffbf5':'#fff',
      borderTop:topBdr?'2px solid #fcd9a8':'1px solid '+border}}>
      <div>
        <div style={{fontSize:'13px',fontWeight:bold?'700':'400',color:bold?text1:text2}}>{label}</div>
        {note&&<div style={{fontSize:'10px',color:'#6b7280',marginTop:'1px'}}>{note}</div>}
      </div>
      <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:'13px',fontWeight:bold?'700':'500',color:color||text1,whiteSpace:'nowrap'}}>{val}</div>
    </div>
  );
  return (
    <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px'}}>
        {[{l:'Fill Weight',v:`${variant.fillWeightG}g`},{l:'Pouches / Unit',v:String(c.totalPouches)},{l:'Pack Type',v:variant.packingType}].map(x=>(

            <div style={{fontWeight:'700',fontSize:'14px',color:'#111111'}}>{x.v}</div>

        <div style={{borderRadius:'12px',overflow:'hidden',border:'1px solid '+border}}>

          <Row label="Laminate cost" note={`₹${variant.laminate?.ratePerKg}/kg · ${variant.laminate?.pouchesPerKg} pcs/kg · ${f2(1000/(variant.laminate?.pouchesPerKg||1))}g per pouch`} val={`₹${f2(c.lamCostPerPouch)}`} />

      </div>

        <div style={{fontSize:'10px',fontWeight:'800',color:'#6b7280',letterSpacing:'1.8px',textTransform:'uppercase',marginBottom:'8px'}}>

        </div>
        <div style={{borderRadius:'12px',overflow:'hidden',border:'1px solid '+border}}>
          <Row label={`${c.totalPouches} pouches × ₹${f2(c.totalCostPerPouch)}`} val={`₹${f2(c.pouchCost)}`} />

          <Row label={`Freight (${freightOverride!==null?'outstation':'local'})`} val={`₹${c.freight}`} />
          <Row label="Sub-total (pre-GST)" val={`₹${f2(c.preTaxCost)}`} bold />
          <Row label="+ Output GST 5%" val={`+₹${f2(c.outputTax)}`} color="#c0392b" />
          <Row label="− Input Tax Credits" note="Paid on RM/sub-recipes + laminate + packaging" val={`−₹${f2(c.inputTax)}`} color="#16a34a" />
          <Row label="Net GST payable" val={`₹${f2(c.netGST)}`} color={c.netGST>=0?'#c0392b':'#16a34a'} />
          <Row label="Net Cost (inc. GST)" val={`₹${f2(c.netCost)}`} bold topBdr />

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
          {[{l:'Sell Price',v:`₹${c.effectiveSP}`,cl:text1},{l:'Net Cost',v:`₹${f2(c.netCost)}`,cl:text1},{l:'Net Profit',v:`₹${f2(c.profit)}`,cl:mCol(c.markupPct)},{l:'Markup %',v:`${f1(c.markupPct)}%`,cl:mCol(c.markupPct)}].map(x=>(
            <div key={x.l} style={{background:'rgba(255,255,255,0.75)',borderRadius:'10px',padding:'12px',textAlign:'center'}}>
              <div style={{fontSize:'11px',color:'#374151',marginBottom:'4px'}}>{x.l}</div>
              <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:'20px',fontWeight:'800',color:x.cl}}>{x.v}</div>
            </div>
          ))}
        </div>
        <div style={{marginTop:'10px',background:'rgba(255,255,255,0.6)',borderRadius:'8px',padding:'8px 12px',fontSize:'11px',color:'#374151',display:'flex',gap:'14px',justifyContent:'center',flexWrap:'wrap'}}>
          <span>Cost/pouch: <strong>₹{f2(c.costPerPouch)}</strong></span>
          <span>·</span><span>Gross margin: <strong>{f1(c.grossPct)}%</strong></span>
          <span>·</span><span>Overhead: <strong>₹{f2(c.totalOH)}/kg</strong></span>
        </div>
      </div>
    </div>
  );
}


function ProdForm({prod,rms,subs,products=[],onDone}) {
  const [name,setName]=useState(prod?.name||'');
  const [cat,setCat]=useState(prod?.category||'namkeen');
  const [bom,setBom]=useState(prod?.bom||[]);
  const [outKg,setOutKg]=useState(prod?.batchOutputKg||'');
  const [notes,setNotes]=useState(prod?.notes||'');
  const [subVar,setSubVar]=useState(prod?.subVariety||'');
  const [copyId,setCopyId]=useState('');
  const [copied,setCopied]=useState(false);
  const [busy,setBusy]=useState(false);

  const pc = bom.length&&outKg?calcProduct({bom,batchOutputKg:num(outKg)},rms,subs):null;

  const save = async()=>{
    if(!name||!outKg||!bom.length) return;
    setBusy(true);
    try{
      const d={name,category:cat,subVariety:subVar.trim(),bom,batchOutputKg:num(outKg),gstPct:5,notes:notes.trim()};
      if(prod) await db.collection(C.PROD).doc(prod.id).update(d);
      else await db.collection(C.PROD).add(d);
      onDone();
    } finally{setBusy(false);}
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
      <Inp label="Product Name" value={name} onChange={setName} req placeholder="e.g. Aloo Bhujia" />
      <Sel label="Category" value={cat} onChange={setCat} opts={[{v:'namkeen',l:'🍘 Namkeen'},{v:'snacks',l:'🍟 Snacks (Fryums, etc.)'}]} />
      <Inp label="Sub-Variety (e.g. Bhujia, Sev, Fryums, Matar)" value={subVar} onChange={setSubVar} placeholder="Optional — used for grouping in catalogue" />
      {/* Copy BOM from existing product */}
      {!prod&&(
        <div style={{background:'#eff6ff',border:'1.5px solid #bfdbfe',borderRadius:'10px',padding:'12px',display:'flex',flexDirection:'column',gap:'8px'}}>
          <div style={{fontSize:'11px',fontWeight:'800',color:'#1d4ed8',textTransform:'uppercase',letterSpacing:'0.8px'}}>📋 Copy BOM from Existing Product</div>
          <div style={{display:'flex',gap:'8px',alignItems:'flex-end'}}>
            <div style={{flex:1}}>
              <select value={copyId} onChange={e=>setCopyId(e.target.value)}
                style={{width:'100%',border:'1.5px solid #bfdbfe',borderRadius:'8px',padding:'9px 12px',fontSize:'13px',background:'#fff',fontFamily:'Nunito,sans-serif'}}>
                <option value="">— Select a product to copy from —</option>
                {products.map(p=><option key={p.id} value={p.id}>{p.name} ({(p.bom||[]).length} items · {p.batchOutputKg}kg batch)</option>)}
              </select>
            </div>
            <button onClick={()=>{
              const src=products.find(p=>p.id===copyId);
              if(!src) return;
              setBom((src.bom||[]).map(item=>({...item,_id:Date.now()+Math.random()+''})));
              setOutKg(String(src.batchOutputKg||''));
              setCopied(true);
              setTimeout(()=>setCopied(false),2500);
            }} disabled={!copyId}
              style={{background:copyId?'#1d4ed8':'#e5e7eb',color:copyId?'#fff':'#9ca3af',border:'none',borderRadius:'8px',padding:'9px 16px',cursor:copyId?'pointer':'default',fontWeight:'700',fontSize:'13px',fontFamily:'Nunito,sans-serif',whiteSpace:'nowrap'}}>
              {copied?'✅ Copied!':'Copy BOM'}
            </button>
          </div>
          {copied&&<div style={{fontSize:'12px',color:'#1d4ed8',fontWeight:'600'}}>BOM and batch output copied — review and adjust quantities as needed, then save.</div>}
        </div>
      )}
      <div>
        <div style={{fontSize:'10px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'8px'}}>Bill of Materials (per batch) *</div>
        <BOMBuilder bom={bom} onChange={setBom} rms={rms} subs={subs} allowSubs={true} />
      </div>
      <Inp label="Batch Output — kg of finished namkeen *" value={outKg} onChange={setOutKg} type="number" placeholder="e.g. 7.04" />
      <div style={{display:'flex',flexDirection:'column',gap:'4px'}}>
        <label style={{fontSize:'10px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.8px'}}>📝 BOM Notes (optional)</label>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)}
          placeholder="e.g. Recipe tested on 12-May-2026. Oil ratio adjusted for summer. Masala from Sharma supplier only."
          rows={3}
          style={{border:'1.5px solid #e5e7eb',borderRadius:'8px',padding:'10px 12px',fontSize:'13px',
            fontFamily:'Nunito,sans-serif',width:'100%',resize:'vertical',lineHeight:'1.6',
            background:'#fffbf5',color:'#111111'}} />
      </div>
      {pc&&(
        <div style={{background:'#fff4e6',border:'1px solid #fed7aa',borderRadius:'10px',padding:'12px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',textAlign:'center'}}>
          {[{l:'Batch Cost',v:`₹${f2(pc.bomCost)}`},{l:'Namkeen Cost/kg',v:`₹${f2(pc.namkeenCostPerKg)}`}].map(x=>(
            <div key={x.l}>
              <div style={{fontSize:'10px',color:'#374151'}}>{x.l}</div>
              <div style={{fontWeight:'800',color:'#c2610a',fontFamily:'JetBrains Mono,monospace',fontSize:'15px'}}>{x.v}</div>
            </div>
          ))}
        </div>
      )}
      <Row2>
        <Btn v="secondary" onClick={onDone} full>Cancel</Btn>
        <Btn onClick={save} disabled={busy} full>{busy?'Saving…':prod?'Update':'Create Product'}</Btn>
      </Row2>
    </div>
  );
}

// PRODUCT DETAIL PAGE

function ProdDetail({prod,variants,rms,subs,oh,onBack}) {
  const [pForm,setPForm]=useState(false);
  const [vForm,setVForm]=useState(false);
  const [editV,setEditV]=useState(null);
  const [selVId,setSelVId]=useState(null);
  const [freightView,setFreightView]=useState('local');

  const current = prod;
  const pc = calcProduct(current,rms,subs);
  const myVars = variants.filter(v=>v.productId===current.id);
  const selV = myVars.find(v=>v.id===selVId)||myVars[0]||null;
  const HEADER_H=56;

  const delProd=async()=>{
    if(!confirm(`Delete "${current.name}" and ALL ${myVars.length} variants? Cannot be undone.`)) return;
    for(const v of myVars) await db.collection(C.VAR).doc(v.id).delete();
    await db.collection(C.PROD).doc(current.id).delete();
    onBack();
  };
  const delVar=async v=>{
    if(!confirm(`Delete this ₹${v.mrp} ${v.packingType} variant?`)) return;
    await db.collection(C.VAR).doc(v.id).delete();
    if(selVId===v.id) setSelVId(null);
  };

  const cream='#fdf8f3',cream2='#f7f0e8',border='#e8ddd0',text1='#111111',text2='#374151',text3='#6b7280',orange='#e8851b',orangeL='#fff4e6';

  return (
    <div style={{display:'flex',flexDirection:'column',height:`calc(100vh - ${HEADER_H}px)`,overflow:'hidden',background:cream}}>
      {/* Top bar */}
      <div style={{display:'flex',alignItems:'center',gap:'12px',padding:'10px 20px',flexShrink:0,background:'#fff',borderBottom:`1px solid ${border}`,boxShadow:'0 1px 4px rgba(0,0,0,0.04)'}}>
        <button onClick={onBack} style={{background:cream2,border:`1px solid ${border}`,borderRadius:'8px',padding:'7px 14px',cursor:'pointer',fontWeight:'700',fontSize:'13px',fontFamily:'Nunito,sans-serif',color:'#374151'}}>← Back</button>
        <div style={{fontWeight:'800',fontSize:'16px',color:'#111111',flex:1}}>{current.name}</div>
        <div style={{fontSize:'11px',color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.8px',marginRight:'8px'}}>{current.category} · 5% GST</div>
        <button onClick={()=>setPForm(true)} style={{background:orangeL,border:'1px solid #fcd9a8',borderRadius:'8px',padding:'7px 14px',cursor:'pointer',fontWeight:'700',fontSize:'12px',fontFamily:'Nunito,sans-serif',color:orange}}>✏️ Edit</button>
        <button onClick={delProd} style={{background:'#fff5f5',border:'1px solid #ffd0d0',borderRadius:'8px',padding:'7px 14px',cursor:'pointer',fontWeight:'700',fontSize:'12px',fontFamily:'Nunito,sans-serif',color:'#c0392b'}}>🗑 Delete</button>
      </div>

      <div style={{display:'flex',flex:1,overflow:'hidden',width:'100%'}}>
        {/* LEFT — 40% */}
        <div style={{width:'40%',display:'flex',flexDirection:'column',borderRight:`2px solid ${border}`,overflowY:'auto',background:'#fff'}}>
          {/* Product header */}
          <div style={{background:'linear-gradient(135deg,#e8851b,#f4a340)',padding:'14px',flexShrink:0}}>
            <div style={{fontWeight:'800',fontSize:'17px',color:'#fff'}}>{current.name}</div>
            <div style={{fontSize:'11px',color:'rgba(255,255,255,0.75)',marginTop:'3px',textTransform:'uppercase',letterSpacing:'0.8px'}}>{current.category}{current.subVariety?` · ${current.subVariety}`:''} · {(current.bom||[]).length} ingredients · batch {current.batchOutputKg}kg</div>
            {pc&&(
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px',marginTop:'12px'}}>
                {[{l:'Batch Cost',v:`₹${f2(pc.bomCost)}`},{l:'Namkeen ₹/kg',v:`₹${f2(pc.namkeenCostPerKg)}`},{l:'BOM Items',v:String((current.bom||[]).length)}].map(x=>(
                  <div key={x.l} style={{background:'rgba(255,255,255,0.18)',borderRadius:'10px',padding:'9px',textAlign:'center'}}>
                    <div style={{fontSize:'10px',color:'rgba(255,255,255,0.65)',marginBottom:'3px',textTransform:'uppercase',letterSpacing:'0.5px'}}>{x.l}</div>
                    <div style={{fontWeight:'800',color:'#fff',fontFamily:'JetBrains Mono,monospace',fontSize:'13px'}}>{x.v}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
          {/* BOM */}
          {pc&&(
            <div style={{padding:'12px 14px 8px',flexShrink:0}}>
              <div style={{fontSize:'10px',fontWeight:'800',color:'#6b7280',letterSpacing:'1.8px',textTransform:'uppercase',marginBottom:'8px'}}>Bill of Materials</div>
              <div style={{borderRadius:'12px',overflow:'hidden',border:`1px solid ${border}`}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 52px 66px',background:cream2,padding:'7px 10px',gap:'4px',borderBottom:`1px solid ${border}`}}>
                  {[{l:'Ingredient',a:'left'},{l:'Qty',a:'right'},{l:'Cost',a:'right'}].map(h=>(
                    <div key={h.l} style={{fontSize:'10px',fontWeight:'700',color:'#374151',textAlign:h.a,textTransform:'uppercase',letterSpacing:'0.5px'}}>{h.l}</div>

                    <div>
                      <span style={{fontWeight:'600',fontSize:'12px',color:'#111111'}}>{item.refName}</span>
                      <span style={{marginLeft:'5px',fontSize:'9px',padding:'1px 5px',borderRadius:'8px',background:item.type==='sub'?'#f3e8ff':'#e0f2fe',color:item.type==='sub'?'#7c3aed':'#0369a1',fontWeight:'700'}}>{item.type==='sub'?'PROC':'RAW'}</span>

                <div style={{fontSize:'10px',fontWeight:'800',color:'#374151',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:'5px'}}>📝 BOM Notes</div>

            </>
          ):(
            <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'14px',color:'#6b7280',minHeight:'300px'}}>
              <div style={{fontSize:'56px',opacity:0.4}}>📦</div>
              <div style={{fontWeight:'700',fontSize:'16px',color:'#374151'}}>Select a variant</div>
              <div style={{fontSize:'13px',textAlign:'center',lineHeight:'1.8',color:'#6b7280'}}>Click any variant card on the left<br/>to see its full cost breakdown here.</div>
            </div>
          )}
        </div>
      </div>
      {pForm&&<Modal title="Edit Product" onClose={()=>setPForm(false)}><ProdForm prod={current} rms={rms} subs={subs} products={[]} onDone={()=>setPForm(false)} /></Modal>}
      {vForm&&<Modal title={editV?'Edit Variant':'Add Pack Variant'} onClose={()=>setVForm(false)}><VarForm v={editV} productId={current.id} productName={current.name} onDone={()=>setVForm(false)} /></Modal>}
    </div>
  );
}


function Products({products,variants,rms,subs,oh}) {
  const [q,setQ]=useState('');
  const [cat,setCat]=useState('all');
  const [sortBy,setSortBy]=useState('category'); // 'alpha' | 'category'
  const [form,setForm]=useState(false);
  const [selProd,setSelProd]=useState(null);

  // Keep selected prod in sync with live data
  const liveSel = selProd?products.find(p=>p.id===selProd.id)||selProd:null;

  // Compute BEFORE any early return (Rules of Hooks — no hooks after conditional return)
  const filtered=(()=>{
    let list=products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())&&(cat==='all'||p.category===cat));
    if(sortBy==='alpha') list=[...list].sort((a,b)=>a.name.localeCompare(b.name));
    else list=[...list].sort((a,b)=>{
      const co={namkeen:0,snacks:1};
      const cd=(co[a.category]??2)-(co[b.category]??2);
      if(cd!==0) return cd;
      return (a.subVariety||'').localeCompare(b.subVariety||'')||a.name.localeCompare(b.name);
    });
    return list;
  })();

  if(liveSel) return (
    <div>
      <div style={{padding:'12px 16px',borderBottom:'1px solid #f3f4f6',display:'flex',alignItems:'center',gap:'10px',background:'#fff',position:'sticky',top:0,zIndex:5}}>
        <Btn sm v="ghost" onClick={()=>setSelProd(null)}>← Back</Btn>
        <div style={{fontWeight:'700',fontSize:'14px'}}>{liveSel.name}</div>
      </div>
      <ProdDetail prod={liveSel} variants={variants} rms={rms} subs={subs} oh={oh} onBack={()=>setSelProd(null)} />
    </div>
  );



  return (
    <div style={{padding:'16px',display:'flex',flexDirection:'column',gap:'12px'}}>
      <SecHdr title={`Products (${products.length})`} action={<Btn sm onClick={()=>setForm(true)}>+ Add Product</Btn>} />
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search products…"
        style={{border:'1.5px solid #e5e7eb',borderRadius:'10px',padding:'10px 14px',fontSize:'13px',width:'100%'}} />
      {/* Sort + Print controls */}
      <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
        <div style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.5px'}}>Sort:</div>
        {[{id:'category',l:'By Category'},{id:'alpha',l:'A → Z'}].map(s=>(
          <button key={s.id} onClick={()=>setSortBy(s.id)}
            style={{padding:'6px 12px',borderRadius:'7px',border:'none',cursor:'pointer',fontWeight:'700',fontSize:'12px',fontFamily:'Nunito,sans-serif',
              background:sortBy===s.id?'#1c1c2e':'#f3f4f6',color:sortBy===s.id?'#fff':'#6b7280'}}>
            {s.l}
          </button>
        ))}
        <button onClick={()=>window.__printCatalogue&&window.__printCatalogue()}
          style={{marginLeft:'auto',padding:'6px 14px',borderRadius:'7px',border:'1.5px solid #e8851b',cursor:'pointer',fontWeight:'700',fontSize:'12px',fontFamily:'Nunito,sans-serif',background:'#fff4e6',color:'#e8851b'}}>
          🖨️ Print Catalogue
        </button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'6px'}}>
        {[{id:'all',l:'All'},{id:'namkeen',l:'🍘 Namkeen'},{id:'snacks',l:'🍟 Snacks'}].map(c=>(
          <button key={c.id} onClick={()=>setCat(c.id)}
            style={{padding:'7px 4px',borderRadius:'8px',border:'none',cursor:'pointer',fontWeight:'700',fontSize:'11px',fontFamily:'Nunito,sans-serif',background:cat===c.id?'#e8851b':'#f3f4f6',color:cat===c.id?'#fff':'#6b7280'}}>
            {c.l}
          </button>
        ))}
      </div>
      {filtered.length===0?<Empty icon="🏭" text="No products found. Add your first product." />:filtered.map(prod=>{
        const pc=calcProduct(prod,rms,subs);
        const pvs=variants.filter(v=>v.productId===prod.id);
        const margins=pvs.map(v=>calcVariant(v,pc,oh)).filter(Boolean);
        const bestM=margins.length>0?Math.max(...margins.map(m=>m.markupPct)):null;
        return (
          <Card key={prod.id} onClick={()=>setSelProd(prod)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div>
                <div style={{fontWeight:'800',fontSize:'14px'}}>{prod.name}</div>
                <div style={{fontSize:'11px',color:'#9ca3af',marginTop:'2px'}}>{prod.category}{prod.subVariety?` · ${prod.subVariety}`:''} · {(prod.bom||[]).length} BOM items · {pvs.length} variants</div>
                {pc&&<div style={{fontSize:'12px',color:'#e8851b',marginTop:'4px',fontFamily:'JetBrains Mono,monospace'}}>₹{f2(pc.namkeenCostPerKg)}/kg cost</div>}
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'4px'}}>
                {bestM!==null&&<MBadge pct={bestM} />}
                <span style={{fontSize:'10px',color:'#9ca3af'}}>tap →</span>
              </div>
            </div>
          </Card>
        );
      })}
      {form&&<Modal title="Add New Product" onClose={()=>setForm(false)}><ProdForm rms={rms} subs={subs} products={products} onDone={()=>setForm(false)} /></Modal>}
    </div>
  );
}
