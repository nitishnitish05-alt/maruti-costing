// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════
function Dashboard({products,variants,rms,subs,oh,onGo}) {
  const [whatIf,setWhatIf]             = useState({});
  const [rmSearch,setRmSearch]         = useState('');
  const [schemeAmt,setSchemeAmt]       = useState('');
  const [selProds,setSelProds]         = useState(new Set());

  const varByProd = useMemo(()=>{
    const m={};
    for(const v of variants){if(!m[v.productId])m[v.productId]=[];m[v.productId].push(v);}
    return m;
  },[variants]);

  const simRms = useMemo(()=>
    rms.map(r=>whatIf[r.id]!==undefined&&whatIf[r.id]!==''?{...r,currentRate:num(whatIf[r.id])}:r),
    [rms,whatIf]);

  const hasWhatIf = Object.values(whatIf).some(v=>v!=='');
  const hasScheme = num(schemeAmt)>0 && selProds.size>0;
  const filteredRms = rms.filter(r=>r.name.toLowerCase().includes(rmSearch.toLowerCase()));
  const resetAll    = ()=>{ setWhatIf({}); };
  const changedCount= Object.values(whatIf).filter(v=>v!=='').length;

  // Scheme helpers
  const toggleProd = id => setSelProds(prev=>{ const s=new Set(prev); s.has(id)?s.delete(id):s.add(id); return s; });
  const selectAll  = () => setSelProds(new Set(sortedProducts.map(p=>p.id)));
  const clearSel   = () => setSelProds(new Set());

  // Compute all rows
  const sortedProducts = useMemo(()=>[...products].sort((a,b)=>{
    const order={namkeen:0,snacks:1};
    return (order[a.category]??2)-(order[b.category]??2);
  }),[products]);
  const rows = useMemo(()=>sortedProducts.map(p=>{
    const pcBase = calcProduct(p,rms,subs);
    const pcSim  = calcProduct(p,simRms,subs);
    const pvs    = varByProd[p.id]||[];
    const extra  = selProds.has(p.id) ? num(schemeAmt) : 0;
    const varRows= pvs.map(v=>({
      v,
      cL:  calcVariant(v,pcBase,oh,null,0),
      cO:  calcVariant(v,pcBase,oh,v.freightOutstation||60,0),
      wL:  calcVariant(v,pcSim, oh,null,extra),
      wO:  calcVariant(v,pcSim, oh,v.freightOutstation||60,extra),
    }));
    return {p,pcBase,varRows};
  }),[sortedProducts,rms,simRms,subs,oh,varByProd,selProds,schemeAmt]);

  const wiActive = hasWhatIf||hasScheme;

  if(products.length===0) return (
    <div style={{padding:'40px',textAlign:'center'}}>
      <div style={{fontSize:'48px',marginBottom:'16px'}}>🏭</div>
      <div style={{fontWeight:'700',fontSize:'16px',color:'#374151'}}>No products yet.</div>
    </div>
  );

  const GCOL = '#065f46'; const GBG = '#d1fae5'; // Current = green
  const PCOL = '#5b21b6'; const PBG = '#ede9fe'; // WI      = purple
  const COLS  = '2.2fr 0.65fr 0.65fr 0.65fr 0.65fr 0.6fr 0.6fr 0.6fr 0.6fr';

  return (
    <div style={{display:'flex',width:'100%',height:'calc(100vh - 56px)',overflow:'hidden'}}>

      {/* ══════ SEGMENT 1 — 60% — Product Margins ══════ */}
      <div style={{width:'60%',display:'flex',flexDirection:'column',borderRight:'2px solid #e5e7eb'}}>

        {/* S1 header */}
        <div style={{padding:'8px 14px',borderBottom:'1px solid #e5e7eb',background:'#fff',flexShrink:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}}>
            <div style={{fontSize:'11px',fontWeight:'800',color:'#374151',letterSpacing:'1.5px',textTransform:'uppercase'}}>
              📊 Product Margins {wiActive&&<span style={{color:PCOL,marginLeft:'8px'}}>· Simulation Active</span>}
            </div>
            <div style={{fontSize:'11px',color:'#9ca3af'}}>{rows.length} products · {rows.reduce((s,r)=>s+r.varRows.length,0)} variants</div>
          </div>

          {/* Scheme Simulator bar */}
          <div style={{display:'flex',alignItems:'center',gap:'8px',background:'#f9fafb',borderRadius:'8px',padding:'7px 10px',flexWrap:'wrap'}}>
            <span style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',whiteSpace:'nowrap'}}>💰 Scheme ₹/unit:</span>
            <input type="number" value={schemeAmt} onChange={e=>setSchemeAmt(e.target.value)} placeholder="0"
              style={{width:'70px',border:'1.5px solid #e5e7eb',borderRadius:'6px',padding:'4px 8px',fontSize:'13px',fontFamily:'JetBrains Mono,monospace',background:'#fff'}} />
            <button onClick={selectAll} style={{background:'#e8851b',color:'#fff',border:'none',borderRadius:'6px',padding:'4px 10px',fontSize:'11px',fontWeight:'700',cursor:'pointer',fontFamily:'Nunito,sans-serif'}}>Select All</button>
            <button onClick={clearSel} style={{background:'#f3f4f6',color:'#6b7280',border:'none',borderRadius:'6px',padding:'4px 10px',fontSize:'11px',fontWeight:'700',cursor:'pointer',fontFamily:'Nunito,sans-serif'}}>Clear</button>
            {selProds.size>0&&<span style={{fontSize:'11px',color:'#e8851b',fontWeight:'700'}}>{selProds.size} product{selProds.size>1?'s':''} selected</span>}
            {hasWhatIf&&<button onClick={resetAll} style={{background:'#fee2e2',color:'#dc2626',border:'none',borderRadius:'6px',padding:'4px 10px',fontSize:'11px',fontWeight:'700',cursor:'pointer',fontFamily:'Nunito,sans-serif',marginLeft:'auto'}}>Reset RM ({changedCount})</button>}
          </div>
        </div>

        {/* Column header */}
        <div style={{display:'grid',gridTemplateColumns:COLS,background:'#1c1c2e',padding:'6px 10px',gap:'3px',flexShrink:0}}>
          <div style={{fontSize:'10px',fontWeight:'700',color:'rgba(255,255,255,0.65)'}}>Product / Variant</div>
          {[
            {l:'%L',bg:GBG,cl:GCOL},{l:'%O',bg:GBG,cl:GCOL},
            {l:'WI%L',bg:PBG,cl:PCOL},{l:'WI%O',bg:PBG,cl:PCOL},
            {l:'₹L',bg:GBG,cl:GCOL},{l:'₹O',bg:GBG,cl:GCOL},
            {l:'WI₹L',bg:PBG,cl:PCOL},{l:'WI₹O',bg:PBG,cl:PCOL},
          ].map(h=>(
            <div key={h.l} style={{
              fontSize:'10px',fontWeight:'800',textAlign:'center',
              background:h.bg,color:h.cl,borderRadius:'4px',padding:'2px 2px'
            }}>{h.l}</div>
          ))}
        </div>

        {/* Table body */}
        <div style={{flex:1,overflowY:'auto'}}>
          {rows.map(({p,pcBase,varRows},pi)=>(
            <div key={p.id} style={{borderBottom:'2px solid #f3f4f6'}}>
              {/* Product name row with checkbox */}
              <div onClick={()=>onGo(p)} style={{
                padding:'7px 10px',background:'#f8f4ef',cursor:'pointer',
                display:'flex',alignItems:'center',gap:'8px',borderBottom:'1px solid #e5e7eb',
              }}
                onMouseEnter={e=>e.currentTarget.style.background='#fde68a'}
                onMouseLeave={e=>e.currentTarget.style.background='#f8f4ef'}
              >
                <div onClick={e=>{e.stopPropagation();toggleProd(p.id);}}
                  style={{width:'16px',height:'16px',borderRadius:'4px',border:`2px solid ${selProds.has(p.id)?'#e8851b':'#d1d5db'}`,
                    background:selProds.has(p.id)?'#e8851b':'#fff',cursor:'pointer',flexShrink:0,
                    display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {selProds.has(p.id)&&<span style={{color:'#fff',fontSize:'11px',fontWeight:'900'}}>✓</span>}
                </div>
                <span style={{fontWeight:'800',fontSize:'13px',color:'#1c1c1c'}}>{p.name}</span>
                <span style={{fontSize:'10px',color:'#9ca3af',textTransform:'uppercase',letterSpacing:'0.5px'}}>{p.category}</span>
                {pcBase&&<span style={{fontSize:'10px',color:'#e8851b',fontFamily:'JetBrains Mono,monospace',marginLeft:'auto'}}>₹{f2(pcBase.namkeenCostPerKg)}/kg</span>}
              </div>

              {/* Variant rows */}
              {varRows.map(({v,cL,cO,wL,wO},vi)=>{
                if(!cL) return null;
                const FMT_PCT = (val,ref,active) => {
                  if(!active||!val) return <span style={{color:'#d1d5db',fontSize:'11px'}}>—</span>;
                  const diff = val.markupPct - ref.markupPct;
                  return <div style={{textAlign:'center'}}>
                    <div style={{fontFamily:'JetBrains Mono,monospace',fontWeight:'800',fontSize:'12px',color:mCol(val.markupPct)}}>{f1(val.markupPct)}%</div>
                    {diff!==0&&<div style={{fontSize:'9px',fontFamily:'JetBrains Mono,monospace',color:diff>0?'#16a34a':'#dc2626',fontWeight:'700'}}>{diff>0?'▲':'▼'}{Math.abs(f1(diff))}%</div>}
                  </div>;
                };
                const FMT_PFT = (val,ref,active) => {
                  if(!active||!val) return <span style={{color:'#d1d5db',fontSize:'11px'}}>—</span>;
                  const diff = val.profit - ref.profit;
                  return <div style={{textAlign:'center'}}>
                    <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:'11px',fontWeight:'700',color:mCol(val.markupPct)}}>₹{Math.round(val.profit)}</div>
                    {diff!==0&&<div style={{fontSize:'9px',fontFamily:'JetBrains Mono,monospace',color:diff>0?'#16a34a':'#dc2626',fontWeight:'700'}}>{diff>0?'+':''}{Math.round(diff)}</div>}
                  </div>;
                };
                return (
                  <div key={v.id} style={{
                    display:'grid',gridTemplateColumns:COLS,
                    padding:'6px 10px',gap:'3px',alignItems:'center',
                    background:vi%2===0?'#fff':'#fafafa',borderBottom:'1px solid #f3f4f6'
                  }}>
                    <div style={{paddingLeft:'24px'}}>
                      <span style={{fontSize:'13px'}}>{v.packingType==='box'?'📦':'👜'}</span>
                      <span style={{fontWeight:'700',fontSize:'12px',color:'#374151',marginLeft:'5px'}}>₹{v.mrp}</span>
                      <span style={{fontSize:'10px',color:'#9ca3af',marginLeft:'4px'}}>{v.fillWeightG}g · {cL.totalPouches}pcs</span>
                    </div>
                    {/* Cur%L */}
                    <div style={{textAlign:'center',fontFamily:'JetBrains Mono,monospace',fontWeight:'800',fontSize:'12px',color:mCol(cL.markupPct)}}>{f1(cL.markupPct)}%</div>
                    {/* Cur%O */}
                    <div style={{textAlign:'center',fontFamily:'JetBrains Mono,monospace',fontWeight:'800',fontSize:'12px',color:mCol(cO.markupPct)}}>{f1(cO.markupPct)}%</div>
                    {/* WI%L */}
                    <div>{FMT_PCT(wL,cL,wiActive)}</div>
                    {/* WI%O */}
                    <div>{FMT_PCT(wO,cO,wiActive)}</div>
                    {/* Cur₹L */}
                    <div style={{textAlign:'center',fontFamily:'JetBrains Mono,monospace',fontSize:'11px',fontWeight:'700',color:'#374151'}}>₹{Math.round(cL.profit)}</div>
                    {/* Cur₹O */}
                    <div style={{textAlign:'center',fontFamily:'JetBrains Mono,monospace',fontSize:'11px',fontWeight:'700',color:'#374151'}}>₹{Math.round(cO.profit)}</div>
                    {/* WI₹L */}
                    <div>{FMT_PFT(wL,cL,wiActive)}</div>
                    {/* WI₹O */}
                    <div>{FMT_PFT(wO,cO,wiActive)}</div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>

        {/* Legend */}
        <div style={{padding:'6px 14px',background:'#f9fafb',borderTop:'1px solid #e5e7eb',flexShrink:0,display:'flex',gap:'14px',flexWrap:'wrap'}}>
          {[{bg:GBG,cl:GCOL,l:'Current (L=Local, O=Outstation)'},{bg:PBG,cl:PCOL,l:'What-If (RM changes + Scheme)'}].map(x=>(
            <div key={x.l} style={{display:'flex',alignItems:'center',gap:'5px'}}>
              <div style={{width:'12px',height:'12px',borderRadius:'3px',background:x.bg,border:`1px solid ${x.cl}`}}></div>
              <span style={{fontSize:'10px',color:'#6b7280'}}>{x.l}</span>
            </div>
          ))}
        </div>
      </div>

      {/* ══════ SEGMENT 2 — 40% — What-If Ingredients ══════ */}
      <div style={{width:'40%',display:'flex',flexDirection:'column',background:'#fafafa'}}>
        <div style={{padding:'10px 14px',borderBottom:'1px solid #e5e7eb',background:'#fff',flexShrink:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}}>
            <div style={{fontSize:'11px',fontWeight:'800',color:'#374151',letterSpacing:'1.5px',textTransform:'uppercase'}}>
              🔮 What-If Ingredient Prices
            </div>
            {hasWhatIf&&<button onClick={resetAll} style={{background:'#fee2e2',border:'none',borderRadius:'7px',padding:'4px 10px',fontSize:'11px',fontWeight:'700',color:'#dc2626',cursor:'pointer',fontFamily:'Nunito,sans-serif'}}>Reset RM ({changedCount})</button>}
          </div>
          <input value={rmSearch} onChange={e=>setRmSearch(e.target.value)} placeholder="Search ingredient…"
            style={{width:'100%',border:'1.5px solid #e5e7eb',borderRadius:'8px',padding:'7px 12px',fontSize:'12px'}} />
          {!hasWhatIf&&<div style={{fontSize:'11px',color:'#9ca3af',marginTop:'5px'}}>Type a new price in <strong>What-If ₹</strong> → Segment 1 updates instantly. Combine with scheme simulator.</div>}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 70px 80px',padding:'6px 14px',gap:'6px',background:'#1c1c2e',flexShrink:0}}>
          {[{l:'Ingredient',a:'left'},{l:'Current ₹',a:'right'},{l:'What-If ₹',a:'right',purple:true}].map(h=>(
            <div key={h.l} style={{fontSize:'10px',fontWeight:'700',textAlign:h.a,color:h.purple?'#a78bfa':'rgba(255,255,255,0.65)'}}>{h.l}</div>
          ))}
        </div>
        <div style={{flex:1,overflowY:'auto'}}>
          {filteredRms.map((rm,i)=>{
            const wiVal=whatIf[rm.id];
            const hasWI=wiVal!==undefined&&wiVal!=='';
            const diff=hasWI?num(wiVal)-rm.currentRate:0;
            return (
              <div key={rm.id} style={{
                display:'grid',gridTemplateColumns:'1fr 70px 80px',
                padding:'6px 14px',gap:'6px',alignItems:'center',
                borderBottom:'1px solid #f3f4f6',
                background:hasWI?'#fff9f0':i%2===0?'#fff':'#fafafa',
                borderLeft:hasWI?'3px solid #e8851b':'3px solid transparent',
              }}>
                <div>
                  <div style={{fontWeight:hasWI?'700':'500',fontSize:'12px',color:'#1c1c1c'}}>{rm.name}</div>
                  {hasWI&&<div style={{fontSize:'10px',fontFamily:'JetBrains Mono,monospace',color:diff>0?'#dc2626':'#16a34a',fontWeight:'700'}}>{diff>0?'▲':'▼'} {diff>0?'+':''}{f2(diff)} ₹/kg</div>}
                </div>
                <div style={{textAlign:'right',fontFamily:'JetBrains Mono,monospace',fontSize:'12px',fontWeight:'600',color:'#374151'}}>₹{rm.currentRate}</div>
                <div style={{textAlign:'right'}}>
                  <input type="number" value={wiVal??''} placeholder="—"
                    onChange={e=>setWhatIf(prev=>({...prev,[rm.id]:e.target.value}))}
                    style={{width:'72px',textAlign:'right',
                      border:`1.5px solid ${hasWI?'#e8851b':'#e5e7eb'}`,borderRadius:'6px',
                      padding:'4px 7px',fontSize:'12px',fontFamily:'JetBrains Mono,monospace',
                      background:hasWI?'#fff4e6':'#fff',
                      fontWeight:hasWI?'700':'400',
                      color:hasWI?(diff>0?'#dc2626':'#16a34a'):'#374151'}} />
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}


function Settings({oh}) {
  const [lab,setLab]=useState('');
  const [boi,setBoi]=useState('');
  const [ele,setEle]=useState('');
  const [ind,setInd]=useState('');
  const [busy,setBusy]=useState(false);
  const [ok,setOk]=useState(false);

  useEffect(()=>{setLab(oh.labourPerKg||'');setBoi(oh.boilerFuelPerKg||'');setEle(oh.electricityPerKg||'');setInd(oh.indirectPerKg||'');},[oh]);

  const total=num(lab)+num(boi)+num(ele)+num(ind);

  const save=async()=>{
    setBusy(true);
    try{
      const rates={labourPerKg:num(lab),boilerFuelPerKg:num(boi),electricityPerKg:num(ele),indirectPerKg:num(ind)};
      await db.collection(C.OH).doc('rates').set({...rates,history:FV.arrayUnion({...rates,date:today()})},{merge:true});
      setOk(true); setTimeout(()=>setOk(false),2500);
    } finally{setBusy(false);}
  };

  const hist=(oh.history||[]).slice().reverse().slice(0,10);

  return (
    <div style={{padding:'16px',display:'flex',flexDirection:'column',gap:'16px'}}>
      <SecHdr title="Overhead Rates (₹ per kg)" />
      <InfoBox>💡 These rates are applied at final product level on every kg of finished namkeen/snack. Update monthly based on your cost analysis.</InfoBox>
      <Card>
        <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
          {[{l:'👷 Labour Cost',v:lab,s:setLab,d:'Worker wages per kg of production'},{l:'🔥 Boiler / Fuel',v:boi,s:setBoi,d:'Fuel cost for frying operations'},{l:'⚡ Electricity',v:ele,s:setEle,d:'Power consumption per kg'},{l:'📋 Indirect Overheads',v:ind,s:setInd,d:'Admin, maintenance, misc per kg'}].map(x=>(
            <div key={x.l} style={{display:'grid',gridTemplateColumns:'1fr 100px',gap:'10px',alignItems:'center'}}>
              <div>
                <div style={{fontWeight:'700',fontSize:'13px'}}>{x.l}</div>
                <div style={{fontSize:'11px',color:'#9ca3af'}}>{x.d}</div>
              </div>
              <Inp value={x.v} onChange={x.s} type="number" placeholder="₹/kg" />
            </div>
          ))}
          <div style={{borderTop:'2px solid #e8851b',paddingTop:'12px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontWeight:'800',fontSize:'14px'}}>Total Overhead</div>
              <div style={{fontSize:'11px',color:'#9ca3af'}}>Added to every kg of finished product</div>
            </div>
            <div style={{fontFamily:'JetBrains Mono,monospace',fontWeight:'800',fontSize:'20px',color:'#e8851b'}}>₹{f2(total)}/kg</div>
          </div>
          <Btn onClick={save} disabled={busy} full>{busy?'Saving…':ok?'✅ Saved!':'Save Overhead Rates'}</Btn>
        </div>
      </Card>

      {hist.length>0&&(
        <div>
          <div style={{fontSize:'10px',fontWeight:'800',color:'#374151',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:'8px'}}>Rate Change History</div>
          {hist.map((h,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:i%2===0?'#fff':'#f9fafb',borderRadius:'8px',marginBottom:'4px',fontSize:'12px'}}>
              <span style={{color:'#6b7280'}}>{h.date}</span>
              <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:'11px',color:'#374151'}}>
                L:₹{h.labourPerKg} · B:₹{h.boilerFuelPerKg} · E:₹{h.electricityPerKg} · I:₹{h.indirectPerKg}
                <span style={{fontWeight:'800',color:'#e8851b'}}> = ₹{f2(num(h.labourPerKg)+num(h.boilerFuelPerKg)+num(h.electricityPerKg)+num(h.indirectPerKg))}/kg</span>
              </span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const [authed, setAuthed]   = useState(false);
  const [lastActive, setLastActive] = useState(Date.now());
  const [tab,setTab]=useState('dashboard');
  const [rms,rmsL]     = useCol(C.RM);
  const [subs,subsL]   = useCol(C.SUB);
  const [prods,prodsL] = useCol(C.PROD);
  const [vars,varsL]   = useCol(C.VAR);
  const oh             = useOverhead();

  const loading = rmsL||subsL||prodsL||varsL;

  // ── Inactivity auto-lock ─────────────────────────────────────────────
  useEffect(()=>{
    if(!authed) return;
    const events = ['mousemove','mousedown','keydown','touchstart','scroll','click'];
    const reset = ()=>setLastActive(Date.now());
    events.forEach(e=>window.addEventListener(e,reset,{passive:true}));
    const timer = setInterval(()=>{
      if(Date.now()-lastActive >= INACTIVITY_TIMEOUT_MS) setAuthed(false);
    }, 10000);
    return ()=>{ events.forEach(e=>window.removeEventListener(e,reset)); clearInterval(timer); };
  },[authed, lastActive]);

  if(!authed) return <LoginScreen onLogin={()=>{ setAuthed(true); setLastActive(Date.now()); }} />;

  const navToProduct = prod => { setTab('products'); setTimeout(()=>window.__navProd&&window.__navProd(prod),50); };

  const TABS=[
    {id:'dashboard',e:'📊',l:'Dashboard'},
    {id:'ingredients',e:'🌾',l:'Ingredients'},
    {id:'subrecipes',e:'⚙️',l:'Sub-Recipes'},
    {id:'products',e:'🏭',l:'Products'},
    {id:'settings',e:'🔧',l:'Settings'},
  ];

  // Expose data for catalogue print generator
  useEffect(()=>{
    window.__catalogueData = {products:prods, variants:vars};
  },[prods,vars]);

  if(loading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f8f4ef'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:'48px',marginBottom:'12px'}}>🍘</div>
        <div style={{fontWeight:'800',color:'#e8851b',fontSize:'16px'}}>Loading Maruti Costing…</div>
        <div style={{color:'#9ca3af',fontSize:'12px',marginTop:'6px'}}>Connecting to Firebase…</div>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',background:'#f8f4ef',maxWidth:(tab==='dashboard'||tab==='products')?'100%':'540px',margin:'0 auto',display:'flex',flexDirection:'column'}}>
      {/* Header */}
      <div style={{background:'linear-gradient(135deg,#1c1c2e,#2d1810)',padding:'13px 16px',position:'sticky',top:0,zIndex:20}}>
        <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
          <span style={{fontSize:'22px'}}>🍘</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:'800',fontSize:'15px',color:'#fff'}}>Maruti Namkeen Costing</div>
            <div style={{fontSize:'10px',color:'#e8851b',fontWeight:'700',letterSpacing:'1px',textTransform:'uppercase'}}>
              {rms.length} RM · {subs.length} Sub-recipes · {prods.length} Products · {vars.length} Variants
            </div>
          </div>
          <button
            onClick={()=>{ if(confirm('Log out of Maruti Costing?')) setAuthed(false); }}
            style={{
              background:'rgba(255,255,255,0.12)', border:'1px solid rgba(255,255,255,0.2)',
              borderRadius:'8px', padding:'6px 14px', color:'#fff', cursor:'pointer',
              fontSize:'12px', fontWeight:'700', fontFamily:'Nunito,sans-serif',
              display:'flex', alignItems:'center', gap:'5px', whiteSpace:'nowrap'
            }}
          >🔒 Logout</button>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflow:tab==='dashboard'?'hidden':'auto',paddingBottom:tab==='dashboard'?'0':'68px'}}>
        {tab==='dashboard'   &&<Dashboard products={prods} variants={vars} rms={rms} subs={subs} oh={oh} onGo={p=>{setTab('products');}}/>}
        {tab==='ingredients' &&<RawMaterials rms={rms} />}
        {tab==='subrecipes'  &&<SubRecipes subs={subs} rms={rms} />}
        {tab==='products'    &&<Products products={prods} variants={vars} rms={rms} subs={subs} oh={oh} />}
        {tab==='settings'    &&<Settings oh={oh} />}
      </div>

      {/* Bottom Nav */}
      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:(tab==='dashboard'||tab==='products')?'100%':'540px',background:'#fff',borderTop:'1px solid #e5e7eb',display:'grid',gridTemplateColumns:'repeat(5,1fr)',zIndex:20}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{border:'none',background:'transparent',padding:'9px 4px',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',borderTop:tab===t.id?'3px solid #e8851b':'3px solid transparent'}}>
            <span style={{fontSize:'17px'}}>{t.e}</span>
            <span style={{fontSize:'9px',fontWeight:'700',fontFamily:'Nunito,sans-serif',color:tab===t.id?'#e8851b':'#9ca3af',textTransform:'uppercase',letterSpacing:'0.4px'}}>{t.l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
