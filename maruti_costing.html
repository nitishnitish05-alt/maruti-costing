// ═══════════════════════════════════════════════════════════════════════════
// CALCULATION ENGINE
// ═══════════════════════════════════════════════════════════════════════════
function calcSubRecipe(sr, rms) {
  if (!sr?.bom?.length || !sr.outputKg) return { costPerKg:0, taxPerKg:0 };
  let cost=0, tax=0;
  for (const item of sr.bom) {
    const rm = rms.find(r=>r.id===item.refId);
    if (rm) {
      cost += num(item.qtyKg) * num(rm.currentRate);
      tax  += num(item.qtyKg) * num(rm.currentRate) * (num(rm.taxPct)/100);
    }
  }
  return { costPerKg: cost/sr.outputKg, taxPerKg: tax/sr.outputKg };
}

function calcProduct(product, rms, subs) {
  if (!product?.bom?.length) return null;
  let bomCost=0, bomTax=0;
  const bomRows = product.bom.map(item => {
    let rate=0, taxRate=0;
    if (item.type==='rm') {
      const rm = rms.find(r=>r.id===item.refId);
      if (rm) { rate=num(rm.currentRate); taxRate=num(rm.currentRate)*num(rm.taxPct)/100; }
    } else {
      const sr = subs.find(s=>s.id===item.refId);
      if (sr) { const c=calcSubRecipe(sr,rms); rate=c.costPerKg; taxRate=c.taxPerKg; }
    }
    const cost=num(item.qtyKg)*rate, taxAmt=num(item.qtyKg)*taxRate;
    bomCost+=cost; bomTax+=taxAmt;
    return {...item, rate, taxRate, cost, taxAmt};
  });
  const out = num(product.batchOutputKg)||1;
  return { bomRows, bomCost, bomTax, namkeenCostPerKg:bomCost/out, namkeenTaxPerKg:bomTax/out };
}

function calcVariant(variant, pc, oh) {
  if (!variant||!pc) return null;
  const totalOH = num(oh.labourPerKg)+num(oh.boilerFuelPerKg)+num(oh.electricityPerKg)+num(oh.indirectPerKg);
  const totalCostPerKg = pc.namkeenCostPerKg + totalOH;
  const fillKg = num(variant.fillWeightG)/1000;

  const nmCostPerPouch = totalCostPerKg * fillKg;
  const nmTaxPerPouch  = pc.namkeenTaxPerKg * fillKg;
  const lam = variant.laminate||{};
  const lamCostPerPouch = lam.ratePerKg&&lam.pouchesPerKg ? num(lam.ratePerKg)/num(lam.pouchesPerKg) : 0;
  const lamTaxPerPouch  = lam.ratePerKg&&lam.pouchesPerKg ? (num(lam.ratePerKg)*0.18)/num(lam.pouchesPerKg) : 0;
  const totalCostPerPouch = nmCostPerPouch + lamCostPerPouch;
  const totalTaxPerPouch  = nmTaxPerPouch  + lamTaxPerPouch;

  let totalPouches=0, packCost=0, packTax=0;
  if (variant.packingType==='box') {
    const ct = variant.carton||{};
    totalPouches = num(ct.pouchesPerCarton);
    packCost = num(ct.rate);
    packTax  = packCost * 0.05;
  } else {
    const pb=variant.primaryBag||{}, mb=variant.masterBag||{};
    const pbCount = num(mb.primaryBagsPerMaster);
    totalPouches = num(pb.pouchesPerBag) * pbCount;
    const pbCost = num(pb.ratePerBag)*pbCount, mbCost = num(mb.ratePerBag);
    packCost = pbCost+mbCost;
    packTax  = packCost*0.18;
  }

  const pouchCost  = totalCostPerPouch * totalPouches;
  const freight    = num(variant.freightLocal)||40;
  const preTaxCost = pouchCost + packCost + freight;
  const inputTax   = totalTaxPerPouch*totalPouches + packTax;
  const outputTax  = preTaxCost * 0.05;
  const netGST     = outputTax - inputTax;
  const netCost    = preTaxCost + netGST;
  const effectiveSP = num(variant.sellingPricePerUnit) - num(variant.scheme);
  const profit      = effectiveSP - netCost;
  const markupPct   = netCost>0 ? (profit/netCost)*100 : 0;
  const grossPct    = effectiveSP>0 ? (profit/effectiveSP)*100 : 0;

  return {
    totalOH, totalCostPerKg, nmCostPerPouch, lamCostPerPouch, totalCostPerPouch,
    totalPouches, packCost, packTax, pouchCost, preTaxCost,
    inputTax, outputTax, netGST, netCost,
    effectiveSP, profit, markupPct, grossPct,
    costPerPouch: totalPouches>0 ? netCost/totalPouches : 0
  };
}

// ═══════════════════════════════════════════════════════════════════════════
// FIREBASE HOOKS
// ═══════════════════════════════════════════════════════════════════════════
function useCol(col) {
  const [data,setData] = useState([]);
  const [loading,setLoading] = useState(true);
  useEffect(()=>{
    return db.collection(col).onSnapshot(snap=>{
      setData(snap.docs.map(d=>({id:d.id,...d.data()})));
      setLoading(false);
    });
  },[col]);
  return [data,loading];
}

function useOverhead() {
  const [oh,setOh] = useState({labourPerKg:0,boilerFuelPerKg:0,electricityPerKg:0,indirectPerKg:0,history:[]});
  useEffect(()=>{
    return db.collection(C.OH).doc('rates').onSnapshot(snap=>{
      if(snap.exists) setOh(snap.data());
    });
  },[]);
  return oh;
}

// BOM BUILDER — shared by sub-recipes and products
// ═══════════════════════════════════════════════════════════════════════════
function BOMBuilder({bom,onChange,rms,subs=[],allowSubs=true}) {
  const [addType,setAddType]   = useState('rm');
  const [addRefId,setAddRefId] = useState('');
  const [addRefNm,setAddRefNm] = useState('');
  const [addQty,setAddQty]     = useState('');

  const getRate = (type,refId) => {
    if(type==='rm'){const rm=rms.find(r=>r.id===refId);return rm?num(rm.currentRate):0;}
    const sr=subs.find(s=>s.id===refId);return sr?calcSubRecipe(sr,rms).costPerKg:0;
  };

  const totalCost = bom.reduce((s,i)=>s+num(i.qtyKg)*getRate(i.type,i.refId),0);

  const handleAdd = () => {
    if(!addRefId||!addQty||!addRefNm) return;
    onChange([...bom,{type:addType,refId:addRefId,refName:addRefNm,qtyKg:num(addQty),_id:Date.now()+''}]);
    setAddRefId(''); setAddRefNm(''); setAddQty('');
  };
  const rmItem = idx => onChange(bom.filter((_,i)=>i!==idx));
  const chgQty = (idx,v) => onChange(bom.map((it,i)=>i===idx?{...it,qtyKg:num(v)}:it));

  const rmOpts = rms.map(r=>({v:r.id,l:`${r.name} (₹${r.currentRate}/kg)`}));
  const srOpts = subs.map(s=>{const c=calcSubRecipe(s,rms);return {v:s.id,l:`${s.name} (₹${f2(c.costPerKg)}/kg)`};});

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
      {bom.length>0&&(
        <div style={{borderRadius:'10px',overflow:'hidden',border:'1.5px solid #e5e7eb'}}>
          {bom.map((item,idx)=>{
            const rate=getRate(item.type,item.refId);
            const cost=num(item.qtyKg)*rate;
            return (
              <div key={item._id||idx} style={{display:'grid',gridTemplateColumns:'1fr 72px 68px 26px',padding:'8px 10px',borderTop:idx>0?'1px solid #f3f4f6':'none',background:idx%2===0?'#fff':'#fafafa',alignItems:'center',gap:'6px'}}>
                <div>
                  <div style={{fontWeight:'600',fontSize:'12px'}}>{item.refName}</div>
                  <div style={{fontSize:'10px',color:item.type==='sub'?'#7c3aed':'#0369a1'}}>{item.type==='sub'?'PROC':'RAW'} · ₹{f2(rate)}/kg</div>
                </div>
                <input type="number" value={item.qtyKg} onChange={e=>chgQty(idx,e.target.value)}
                  style={{border:'1.5px solid #e5e7eb',borderRadius:'6px',padding:'4px 6px',fontSize:'12px',textAlign:'right',width:'100%',fontFamily:'JetBrains Mono,monospace'}} />
                <div style={{textAlign:'right',fontFamily:'JetBrains Mono,monospace',fontSize:'12px',fontWeight:'600'}}>₹{f2(cost)}</div>
                <button onClick={()=>rmItem(idx)} style={{background:'#fee2e2',border:'none',borderRadius:'5px',color:'#dc2626',cursor:'pointer',fontWeight:'700',fontSize:'15px',width:'22px',height:'22px',lineHeight:'1'}}>×</button>
              </div>
            );
          })}
          <div style={{display:'flex',justifyContent:'space-between',padding:'8px 10px',background:'#fff9f0',borderTop:'2px solid #e8851b'}}>
            <span style={{fontWeight:'700',fontSize:'12px',color:'#c2610a'}}>Total Batch Cost</span>
            <span style={{fontFamily:'JetBrains Mono,monospace',fontWeight:'700',color:'#c2610a'}}>₹{f2(totalCost)}</span>
          </div>
        </div>
      )}
      <div style={{background:'#f9fafb',borderRadius:'10px',padding:'12px',display:'flex',flexDirection:'column',gap:'8px'}}>
        <div style={{fontSize:'10px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase'}}>+ Add Item to BOM</div>
        {allowSubs&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}}>
            {['rm','sub'].map(t=>(
              <button key={t} onClick={()=>{setAddType(t);setAddRefId('');setAddRefNm('');}}
                style={{padding:'7px',borderRadius:'7px',border:'none',cursor:'pointer',fontWeight:'700',fontSize:'11px',fontFamily:'Sora,sans-serif',background:addType===t?'#e8851b':'#e5e7eb',color:addType===t?'#fff':'#6b7280'}}>
                {t==='rm'?'🌾 Raw Material':'⚙️ Sub-Recipe'}
              </button>
            ))}
          </div>
        )}
        <select value={addRefId} onChange={e=>{
          const opts=addType==='rm'?rmOpts:srOpts;
          const opt=opts.find(o=>o.v===e.target.value);
          setAddRefId(e.target.value);
          setAddRefNm(opt?opt.l.split(' (')[0]:'');
        }} style={{border:'1.5px solid #e5e7eb',borderRadius:'8px',padding:'8px 10px',fontSize:'13px',background:'#fff'}}>
          <option value="">Select {addType==='rm'?'ingredient':'sub-recipe'}...</option>
          {(addType==='rm'?rmOpts:srOpts).map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
        </select>
        <div style={{display:'flex',gap:'8px',alignItems:'flex-end'}}>
          <Inp label="Qty (kg)" value={addQty} onChange={setAddQty} type="number" style={{flex:1}} />
          <Btn onClick={handleAdd} disabled={!addRefId||!addQty}>Add</Btn>
        </div>
      </div>
    </div>
  );
}

function RMForm({rm,onDone}) {
  const [name,setName]=useState(rm?.name||'');
  const [rate,setRate]=useState(rm?.currentRate||'');
  const [tax,setTax]=useState(rm?.taxPct??'');
  const [busy,setBusy]=useState(false);

  const save = async()=>{
    if(!name||rate===''){return;}
    setBusy(true);
    try{
      if(rm){
        const rateChanged=num(rate)!==rm.currentRate;
        await db.collection(C.RM).doc(rm.id).update({
          name, currentRate:num(rate), taxPct:num(tax),
          ...(rateChanged&&{rateHistory:FV.arrayUnion({rate:num(rate),date:today()})})
        });
      } else {
        await db.collection(C.RM).add({name,currentRate:num(rate),taxPct:num(tax),rateHistory:[{rate:num(rate),date:today()}]});
      }
      onDone();
    } finally{setBusy(false);}
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
      <Inp label="Ingredient Name" value={name} onChange={setName} req />
      <Row2>
        <Inp label="Rate ₹/kg" value={rate} onChange={setRate} type="number" req />
        <Inp label="GST %" value={tax} onChange={setTax} type="number" placeholder="0" />

// BULK ENTRY — spreadsheet style, all rows at once
function BulkRMEntry({existingNames, onDone}) {
  const EMPTY = () => ({name:'',rate:'',tax:'0',_id:Date.now()+Math.random()});
  const [rows,setRows] = useState(()=>[...PRESET_RMS.map(p=>({...p,tax:String(p.tax),_id:Math.random()})),...Array(5).fill(null).map(EMPTY)]);
  const [busy,setBusy] = useState(false);
  const [progress,setProgress] = useState('');

  const addRows = n => setRows(r=>[...r,...Array(n).fill(null).map(EMPTY)]);
  const updRow = (idx,field,val) => setRows(r=>r.map((row,i)=>i===idx?{...row,[field]:val}:row));
  const delRow = idx => setRows(r=>r.filter((_,i)=>i!==idx));

  const validRows = rows.filter(r=>r.name.trim()&&r.rate!=='');

  const saveAll = async()=>{
    if(!validRows.length) return;
    setBusy(true);
    try{
      const batch = db.batch();
      let count=0;
      for(const row of validRows){
        const nm = row.name.trim();
        if(existingNames.includes(nm.toLowerCase())) continue; // skip duplicates
        const ref = db.collection(C.RM).doc();
        batch.set(ref,{name:nm,currentRate:num(row.rate),taxPct:num(row.tax)||0,rateHistory:[{rate:num(row.rate),date:today()}]});
        count++;
        if(count%400===0){ await batch.commit(); setProgress(`Saved ${count}…`); }
      }
      await batch.commit();
      setProgress(`✅ ${count} ingredients saved!`);
      setTimeout(onDone, 1200);
    } catch(e){setProgress('Error: '+e.message);}
    finally{setBusy(false);}
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
      <InfoBox>📋 All 65 common namkeen ingredients are pre-loaded below. Update rates to match your current prices, remove what you don't use, add anything extra. Then click Save All.</InfoBox>
      <div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>
        <div style={{fontSize:'12px',color:'#6b7280'}}><strong>{validRows.length}</strong> valid rows ready</div>
        <Btn sm v="secondary" onClick={()=>addRows(5)}>+ 5 rows</Btn>
        <Btn sm v="secondary" onClick={()=>addRows(10)}>+ 10 rows</Btn>
      </div>

      {/* Sticky header */}
      <div style={{borderRadius:'10px',overflow:'hidden',border:'1.5px solid #e5e7eb'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 90px 70px 28px',background:'#e8851b',padding:'8px 10px',gap:'6px',position:'sticky',top:0,zIndex:2}}>
          {['Ingredient Name','Rate ₹/kg','GST %',''].map(h=>(
            <div key={h} style={{fontSize:'10px',fontWeight:'700',color:'#fff'}}>{h}</div>
          ))}
        </div>
        <div style={{maxHeight:'55vh',overflowY:'auto'}}>
          {rows.map((row,idx)=>(
            <div key={row._id} style={{display:'grid',gridTemplateColumns:'1fr 90px 70px 28px',padding:'5px 8px',borderTop:'1px solid #f3f4f6',background:idx%2===0?'#fff':'#fafafa',gap:'6px',alignItems:'center'}}>
              <input value={row.name} onChange={e=>updRow(idx,'name',e.target.value)}
                placeholder={`Ingredient ${idx+1}`}
                style={{border:'1px solid #e5e7eb',borderRadius:'6px',padding:'6px 8px',fontSize:'12px',width:'100%'}} />
              <input type="number" value={row.rate} onChange={e=>updRow(idx,'rate',e.target.value)}
                placeholder="₹/kg"
                style={{border:'1px solid #e5e7eb',borderRadius:'6px',padding:'6px 8px',fontSize:'12px',width:'100%',textAlign:'right',fontFamily:'JetBrains Mono,monospace'}} />
              <select value={row.tax} onChange={e=>updRow(idx,'tax',e.target.value)}
                style={{border:'1px solid #e5e7eb',borderRadius:'6px',padding:'6px 4px',fontSize:'12px',background:'#fff',width:'100%'}}>
                {['0','5','12','18','28'].map(t=><option key={t} value={t}>{t}%</option>)}
              </select>
              <button onClick={()=>delRow(idx)}
                style={{background:'#fee2e2',border:'none',borderRadius:'5px',color:'#dc2626',cursor:'pointer',fontWeight:'700',fontSize:'14px',width:'22px',height:'22px',lineHeight:'1'}}>×</button>
            </div>
          ))}
        </div>
      </div>

      {progress&&<div style={{textAlign:'center',fontWeight:'700',color:'#e8851b',fontSize:'13px'}}>{progress}</div>}

      <div style={{display:'flex',gap:'8px',position:'sticky',bottom:0,background:'#fff',padding:'8px 0'}}>
        <Btn v="secondary" onClick={onDone} full>Cancel</Btn>
        <Btn onClick={saveAll} disabled={busy||!validRows.length} full>
          {busy?`Saving ${validRows.length} items…`:`💾 Save All (${validRows.length} items)`}
        </Btn>
      </div>
    </div>
  );
}

function SRForm({sr,rms,onDone}) {
  const [name,setName]=useState(sr?.name||'');
  const [type,setType]=useState(sr?.type||'frying');
  const [bom,setBom]=useState(sr?.bom||[]);
  const [outKg,setOutKg]=useState(sr?.outputKg||'');
  const [busy,setBusy]=useState(false);

  const inKg = bom.reduce((s,i)=>s+num(i.qtyKg),0);
  const yldPct = outKg>0&&inKg>0?((outKg/inKg)*100).toFixed(1):'-';
  const {costPerKg,taxPerKg} = outKg>0?calcSubRecipe({bom,outputKg:num(outKg)},rms):{costPerKg:0,taxPerKg:0};

  const save = async()=>{
    if(!name||!outKg||!bom.length) return;
    setBusy(true);
    try{
      const d={name,type,bom,inputKg:inKg,outputKg:num(outKg),yieldPct:num(yldPct)||0};
      if(sr) await db.collection(C.SUB).doc(sr.id).update(d);
      else await db.collection(C.SUB).add(d);
      onDone();
    } finally{setBusy(false);}
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
      <Inp label="Sub-Recipe Name" value={name} onChange={setName} req placeholder="e.g. Masoor Bhujia" />
      <Sel label="Process Type" value={type} onChange={setType} opts={[{v:'frying',l:'🔥 Frying'},{v:'extrusion',l:'⚙️ Extrusion (Sev/Gathiya machine)'},{v:'blending',l:'🥣 Blending / Masala Mix'},{v:'roasting',l:'♨️ Roasting'}]} />
      <div>
        <div style={{fontSize:'10px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'8px'}}>Bill of Materials (Inputs) *</div>
        <BOMBuilder bom={bom} onChange={setBom} rms={rms} allowSubs={false} />
      </div>
      <Row2>
        <div style={{background:'#f9fafb',borderRadius:'8px',padding:'10px',textAlign:'center'}}>
          <div style={{fontSize:'10px',color:'#9ca3af',marginBottom:'2px'}}>Total Input (kg)</div>
          <div style={{fontWeight:'700',fontFamily:'JetBrains Mono,monospace'}}>{f2(inKg)}</div>
        </div>
        <Inp label="Output / Yield (kg) *" value={outKg} onChange={setOutKg} type="number" req />
      </Row2>
      {outKg>0&&inKg>0&&(
        <div style={{background:'#fff4e6',border:'1px solid #fed7aa',borderRadius:'10px',padding:'12px'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',textAlign:'center'}}>
            {[{l:'Yield %',v:`${yldPct}%`},{l:'Cost/kg',v:`₹${f2(costPerKg)}`},{l:'Tax/kg',v:`₹${f2(taxPerKg)}`}].map(x=>(
              <div key={x.l}>
                <div style={{fontSize:'10px',color:'#9a6006'}}>{x.l}</div>
                <div style={{fontWeight:'800',fontSize:'14px',color:'#c2610a',fontFamily:'JetBrains Mono,monospace'}}>{x.v}</div>
              </div>
            ))}
          </div>
        </div>
      )}
      <Row2>
        <Btn v="secondary" onClick={onDone} full>Cancel</Btn>
        <Btn onClick={save} disabled={busy} full>{busy?'Saving…':sr?'Update':'Create'}</Btn>
      </Row2>
    </div>
  );
}

            <Row2>
              <Inp label="Rate ₹/bag" value={pbRt} onChange={setPbRt} type="number" />
              <Inp label="Pouches per bag" value={pbPk} onChange={setPbPk} type="number" />
            </Row2>
          </div>
          <div style={{background:'#faf5ff',borderRadius:'10px',padding:'12px',display:'flex',flexDirection:'column',gap:'10px'}}>
            <div style={{fontSize:'10px',fontWeight:'700',color:'#7c3aed',textTransform:'uppercase'}}>📦 Master Bori (18% GST)</div>
            <Inp label="Bori Size (e.g. 30×38 inch)" value={mbSz} onChange={setMbSz} />
            <Row2>
              <Inp label="Rate ₹/bori" value={mbRt} onChange={setMbRt} type="number" />
              <Inp label="LDPE bags per bori" value={mbCt} onChange={setMbCt} type="number" />
            </Row2>
            {totalPouches>0&&<InfoBox color="purple">1 bori = {mbCt} bags × {pbPk} pouches = <strong>{totalPouches} pouches</strong></InfoBox>}
          </div>
        </div>
      )}

      {/* Pricing */}
      <div style={{background:'#f9fafb',borderRadius:'10px',padding:'12px',display:'flex',flexDirection:'column',gap:'10px'}}>
        <div style={{fontSize:'10px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase'}}>💰 Pricing</div>
        <Row2>
          <Inp label="Selling Price ₹/unit" value={sp} onChange={setSp} type="number" req />
          <Inp label="Scheme ₹/unit" value={sch} onChange={setSch} type="number" />
        </Row2>
        <Row2>
          <Inp label="Freight Local ₹" value={frL} onChange={setFrL} type="number" />
          <Inp label="Freight Outstation ₹" value={frO} onChange={setFrO} type="number" />
        </Row2>
      </div>

      <Row2>
        <Btn v="secondary" onClick={onDone} full>Cancel</Btn>
        <Btn onClick={save} disabled={busy} full>{busy?'Saving…':vt?'Update Variant':'Add Variant'}</Btn>
      </Row2>
    </div>
  );
}

// VARIANT DETAIL BREAKDOWN
// ═══════════════════════════════════════════════════════════════════════════
function VarDetail({variant,pc,oh}) {
  const c = calcVariant(variant,pc,oh);
  if(!c) return null;
  const CRow=({label,val,note,bold,color,topBdr,bg})=>(
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:bg||'transparent',borderTop:topBdr?'2px solid #e8851b':'1px solid #f3f4f6'}}>
      <div>
        <div style={{fontSize:'12px',fontWeight:bold?'700':'400',color:bold?'#1c1c1c':'#374151'}}>{label}</div>
        {note&&<div style={{fontSize:'10px',color:'#9ca3af',marginTop:'1px'}}>{note}</div>}
      </div>
      <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:'12px',fontWeight:bold?'700':'500',color:color||'#1c1c1c'}}>{val}</div>
    </div>
  );

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'6px'}}>
        {[{l:'Fill Wt',v:`${variant.fillWeightG}g`},{l:'Pouches',v:c.totalPouches},{l:'Pack Type',v:variant.packingType}].map(x=>(
          <div key={x.l} style={{background:'#f9fafb',borderRadius:'8px',padding:'8px',textAlign:'center'}}>
            <div style={{fontSize:'10px',color:'#9ca3af'}}>{x.l}</div>
            <div style={{fontWeight:'700',fontSize:'12px'}}>{x.v}</div>
          </div>
        ))}
      </div>
      <div style={{borderRadius:'10px',overflow:'hidden',border:'1.5px solid #e5e7eb'}}>
        <CRow label="Namkeen cost/pouch" note={`${variant.fillWeightG}g × ₹${f2(c.totalCostPerKg)}/kg (incl overhead ₹${f2(c.totalOH)}/kg)`} val={`₹${f2(c.nmCostPerPouch)}`} />
        <CRow label="Laminate cost/pouch" note={`₹${variant.laminate?.ratePerKg}/kg ÷ ${variant.laminate?.pouchesPerKg} pcs`} val={`₹${f2(c.lamCostPerPouch)}`} />
        <CRow label="Total cost per pouch" val={`₹${f2(c.totalCostPerPouch)}`} bold bg="#fff9f0" topBdr />
        <CRow label={`${c.totalPouches} pouches × ₹${f2(c.totalCostPerPouch)}`} val={`₹${f2(c.pouchCost)}`} />
        <CRow label="Packaging (carton/bags/bori)" val={`₹${f2(c.packCost)}`} />
        <CRow label="Freight (local)" val={`₹${variant.freightLocal||40}`} />
        <CRow label="Sub-total (pre-GST)" val={`₹${f2(c.preTaxCost)}`} bold />
        <CRow label="+ Output GST 5%" val={`+₹${f2(c.outputTax)}`} color="#dc2626" />
        <CRow label="− Input Tax Credits" note="Paid on RM/sub-recipe + laminate + packaging" val={`−₹${f2(c.inputTax)}`} color="#16a34a" />
        <CRow label="Net GST payable" val={`₹${f2(c.netGST)}`} color={c.netGST>0?'#dc2626':'#16a34a'} />
        <CRow label="Net Cost (inc. GST)" val={`₹${f2(c.netCost)}`} bold bg="#f9fafb" topBdr />
      </div>
      <div style={{background:mBg(c.markupPct),border:`2px solid ${mBdr(c.markupPct)}`,borderRadius:'12px',padding:'12px'}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}}>
          {[{l:'Sell Price',v:`₹${c.effectiveSP}`},{l:'Net Cost',v:`₹${f2(c.netCost)}`},{l:'Net Profit',v:`₹${f2(c.profit)}`,cl:mCol(c.markupPct)},{l:'Markup %',v:`${f1(c.markupPct)}%`,cl:mCol(c.markupPct)}].map(x=>(
            <div key={x.l} style={{background:'#fff',borderRadius:'8px',padding:'10px',textAlign:'center'}}>
              <div style={{fontSize:'10px',color:'#9ca3af'}}>{x.l}</div>
              <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:'17px',fontWeight:'800',color:x.cl||'#1c1c1c'}}>{x.v}</div>
            </div>
          ))}
        </div>
        <div style={{marginTop:'8px',background:'#fff',borderRadius:'8px',padding:'7px 10px',fontSize:'11px',color:'#6b7280',display:'flex',gap:'10px',justifyContent:'center',flexWrap:'wrap'}}>
          <span>Cost/pouch: ₹{f2(c.costPerPouch)}</span>
          <span>·</span><span>Gross margin: {f1(c.grossPct)}%</span>
          <span>·</span><span>Overhead: ₹{f2(c.totalOH)}/kg</span>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// PRODUCT FORM
// ═══════════════════════════════════════════════════════════════════════════
function ProdForm({prod,rms,subs,onDone}) {
  const [name,setName]=useState(prod?.name||'');
  const [cat,setCat]=useState(prod?.category||'namkeen');
  const [bom,setBom]=useState(prod?.bom||[]);
  const [outKg,setOutKg]=useState(prod?.batchOutputKg||'');
  const [busy,setBusy]=useState(false);

  const pc = bom.length&&outKg?calcProduct({bom,batchOutputKg:num(outKg)},rms,subs):null;

  const save = async()=>{
    if(!name||!outKg||!bom.length) return;
    setBusy(true);
    try{
      const d={name,category:cat,bom,batchOutputKg:num(outKg),gstPct:5};
      if(prod) await db.collection(C.PROD).doc(prod.id).update(d);
      else await db.collection(C.PROD).add(d);
      onDone();
    } finally{setBusy(false);}
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
      <Inp label="Product Name" value={name} onChange={setName} req placeholder="e.g. Aloo Bhujia" />
      <Sel label="Category" value={cat} onChange={setCat} opts={[{v:'namkeen',l:'🍘 Namkeen'},{v:'snacks',l:'🍟 Snacks (Fryums, etc.)'}]} />
      <div>
        <div style={{fontSize:'10px',fontWeight:'700',color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:'8px'}}>Bill of Materials (per batch) *</div>
        <BOMBuilder bom={bom} onChange={setBom} rms={rms} subs={subs} allowSubs={true} />
      </div>
      <Inp label="Batch Output — kg of finished namkeen *" value={outKg} onChange={setOutKg} type="number" placeholder="e.g. 7.04" />
      {pc&&(
        <div style={{background:'#fff4e6',border:'1px solid #fed7aa',borderRadius:'10px',padding:'12px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',textAlign:'center'}}>
          {[{l:'Batch Cost',v:`₹${f2(pc.bomCost)}`},{l:'Namkeen Cost/kg',v:`₹${f2(pc.namkeenCostPerKg)}`}].map(x=>(
            <div key={x.l}>
              <div style={{fontSize:'10px',color:'#9a6006'}}>{x.l}</div>
              <div style={{fontWeight:'800',color:'#c2610a',fontFamily:'JetBrains Mono,monospace',fontSize:'15px'}}>{x.v}</div>
            </div>
          ))}
        </div>
      )}
      <Row2>
        <Btn v="secondary" onClick={onDone} full>Cancel</Btn>
        <Btn onClick={save} disabled={busy} full>{busy?'Saving…':prod?'Update':'Create Product'}</Btn>
      </Row2>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// PRODUCT DETAIL PAGE
// ═══════════════════════════════════════════════════════════════════════════
function ProdDetail({prod,variants,rms,subs,oh,onBack}) {
  const [pForm,setPForm]=useState(false);
  const [vForm,setVForm]=useState(false);
  const [editV,setEditV]=useState(null);
  const [expV,setExpV]=useState(null);

  const current = prod;
  const pc = calcProduct(current,rms,subs);
  const myVars = variants.filter(v=>v.productId===current.id);

  const delProd = async()=>{
    if(!confirm(`Delete "${current.name}" and ALL ${myVars.length} variants? Cannot be undone.`)) return;
    for(const v of myVars) await db.collection(C.VAR).doc(v.id).delete();
    await db.collection(C.PROD).doc(current.id).delete();
    onBack();
  };
  const delVar = async v=>{
    if(!confirm(`Delete this ₹${v.mrp} ${v.packingType} variant?`)) return;
    await db.collection(C.VAR).doc(v.id).delete();
  };

  return (
    <div style={{padding:'16px',display:'flex',flexDirection:'column',gap:'14px'}}>
      <div style={{background:'linear-gradient(135deg,#e8851b,#f59e0b)',borderRadius:'14px',padding:'14px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div style={{fontWeight:'800',fontSize:'18px',color:'#fff'}}>{current.name}</div>
            <div style={{fontSize:'11px',color:'rgba(255,255,255,0.8)',marginTop:'2px',textTransform:'uppercase',letterSpacing:'0.5px'}}>{current.category} · 5% GST</div>
          </div>
          <Btn sm v="ghost" onClick={()=>setPForm(true)} style={{color:'#fff',background:'rgba(255,255,255,0.2)'}}>✏️ Edit</Btn>
        </div>
        {pc&&(
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px',marginTop:'12px'}}>
            {[{l:'Batch Cost',v:`₹${f2(pc.bomCost)}`},{l:'Cost/kg',v:`₹${f2(pc.namkeenCostPerKg)}`},{l:'BOM Items',v:(current.bom||[]).length}].map(x=>(
              <div key={x.l} style={{background:'rgba(255,255,255,0.2)',borderRadius:'8px',padding:'8px',textAlign:'center'}}>
                <div style={{fontSize:'10px',color:'rgba(255,255,255,0.7)'}}>{x.l}</div>
                <div style={{fontWeight:'800',color:'#fff',fontFamily:'JetBrains Mono,monospace',fontSize:'13px'}}>{x.v}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* BOM Summary */}
      {pc&&(
        <div>
          <div style={{fontSize:'10px',fontWeight:'800',color:'#9a6006',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:'8px'}}>BOM — Batch ({current.batchOutputKg} kg output)</div>
          <div style={{borderRadius:'10px',overflow:'hidden',border:'1.5px solid #e5e7eb'}}>
            {pc.bomRows.map((item,i)=>(
              <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 60px 70px',padding:'8px 12px',borderTop:i>0?'1px solid #f3f4f6':'none',background:i%2===0?'#fff':'#fafafa'}}>
                <div>
                  <span style={{fontWeight:'600',fontSize:'12px'}}>{item.refName}</span>
                  <span style={{marginLeft:'5px',fontSize:'9px',padding:'1px 5px',borderRadius:'10px',background:item.type==='sub'?'#f3e8ff':'#e0f2fe',color:item.type==='sub'?'#7c3aed':'#0369a1'}}>{item.type==='sub'?'PROC':'RAW'}</span>
                </div>
                <div style={{textAlign:'right',fontSize:'12px',color:'#6b7280',fontFamily:'JetBrains Mono,monospace'}}>{item.qtyKg}kg</div>
                <div style={{textAlign:'right',fontWeight:'700',fontSize:'12px',fontFamily:'JetBrains Mono,monospace'}}>₹{f2(item.cost)}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Variants */}
      <div>
        <SecHdr title={`Pack Variants (${myVars.length})`} action={<Btn sm onClick={()=>{setEditV(null);setVForm(true);}}>+ Add Variant</Btn>} />
        {myVars.length===0?<Empty icon="📦" text="No variants yet. Add a box or bag variant." />:myVars.map(v=>{
          const vc=pc?calcVariant(v,pc,oh):null;
          const exp=expV===v.id;
          return (
            <Card key={v.id} style={{marginBottom:'8px',border:vc?`1.5px solid ${mBdr(vc.markupPct)}`:undefined}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>setExpV(exp?null:v.id)}>
                <div>
                  <div style={{fontWeight:'800',fontSize:'14px'}}>₹{v.mrp} MRP · {v.packingType==='box'?'📦':'👜'} {v.packingType}</div>
                  <div style={{fontSize:'11px',color:'#9ca3af',marginTop:'2px'}}>
                    {vc?`${vc.totalPouches} pcs · SP ₹${vc.effectiveSP} · Net Cost ₹${f2(vc.netCost)}`:v.fillWeightG+'g fill'}
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  {vc&&<MBadge pct={vc.markupPct} />}
                  <span style={{color:'#9ca3af',fontSize:'16px'}}>{exp?'▲':'▼'}</span>
                </div>
              </div>
              {exp&&pc&&(
                <div style={{marginTop:'14px',borderTop:'1px solid #f3f4f6',paddingTop:'14px'}}>
                  <VarDetail variant={v} pc={pc} oh={oh} />
                  <div style={{display:'flex',gap:'6px',marginTop:'10px'}}>
                    <Btn sm v="secondary" onClick={()=>{setEditV(v);setVForm(true);}} style={{flex:1}}>✏️ Edit Variant</Btn>
                    <Btn sm v="danger" onClick={()=>delVar(v)}>🗑</Btn>
                  </div>
                </div>
              )}
            </Card>
          );
        })}
      </div>

      <Btn v="danger" onClick={delProd} full sm>🗑 Delete Product &amp; All Variants</Btn>

      {pForm&&<Modal title="Edit Product" onClose={()=>setPForm(false)}><ProdForm prod={current} rms={rms} subs={subs} onDone={()=>setPForm(false)} /></Modal>}
      {vForm&&<Modal title={editV?'Edit Variant':'Add Pack Variant'} onClose={()=>setVForm(false)}><VarForm v={editV} productId={current.id} productName={current.name} onDone={()=>setVForm(false)} /></Modal>}
    </div>
  );
}

// PRODUCTS LIST
// ═══════════════════════════════════════════════════════════════════════════
function Products({products,variants,rms,subs,oh}) {
  const [q,setQ]=useState('');
  const [cat,setCat]=useState('all');
  const [form,setForm]=useState(false);
  const [selProd,setSelProd]=useState(null);

  // Keep selected prod in sync with live data
  const liveSel = selProd?products.find(p=>p.id===selProd.id)||selProd:null;

  if(liveSel) return (
    <div>
      <div style={{padding:'12px 16px',borderBottom:'1px solid #f3f4f6',display:'flex',alignItems:'center',gap:'10px',background:'#fff',position:'sticky',top:0,zIndex:5}}>
        <Btn sm v="ghost" onClick={()=>setSelProd(null)}>← Back</Btn>
        <div style={{fontWeight:'700',fontSize:'14px'}}>{liveSel.name}</div>
      </div>
      <ProdDetail prod={liveSel} variants={variants} rms={rms} subs={subs} oh={oh} onBack={()=>setSelProd(null)} />
    </div>
  );

  const filtered=products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())&&(cat==='all'||p.category===cat));

  return (
    <div style={{padding:'16px',display:'flex',flexDirection:'column',gap:'12px'}}>
      <SecHdr title={`Products (${products.length})`} action={<Btn sm onClick={()=>setForm(true)}>+ Add Product</Btn>} />
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search products…"
        style={{border:'1.5px solid #e5e7eb',borderRadius:'10px',padding:'10px 14px',fontSize:'13px',width:'100%'}} />
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'6px'}}>
        {[{id:'all',l:'All'},{id:'namkeen',l:'🍘 Namkeen'},{id:'snacks',l:'🍟 Snacks'}].map(c=>(
          <button key={c.id} onClick={()=>setCat(c.id)}
            style={{padding:'7px 4px',borderRadius:'8px',border:'none',cursor:'pointer',fontWeight:'700',fontSize:'11px',fontFamily:'Sora,sans-serif',background:cat===c.id?'#e8851b':'#f3f4f6',color:cat===c.id?'#fff':'#6b7280'}}>
            {c.l}
          </button>
        ))}
      </div>
      {filtered.length===0?<Empty icon="🏭" text="No products found. Add your first product." />:filtered.map(prod=>{
        const pc=calcProduct(prod,rms,subs);
        const pvs=variants.filter(v=>v.productId===prod.id);
        const margins=pvs.map(v=>calcVariant(v,pc,oh)).filter(Boolean);
        const bestM=margins.length>0?Math.max(...margins.map(m=>m.markupPct)):null;
        return (
          <Card key={prod.id} onClick={()=>setSelProd(prod)}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div>
                <div style={{fontWeight:'800',fontSize:'14px'}}>{prod.name}</div>
                <div style={{fontSize:'11px',color:'#9ca3af',marginTop:'2px'}}>{prod.category} · {(prod.bom||[]).length} BOM items · {pvs.length} variants</div>
                {pc&&<div style={{fontSize:'12px',color:'#e8851b',marginTop:'4px',fontFamily:'JetBrains Mono,monospace'}}>₹{f2(pc.namkeenCostPerKg)}/kg cost</div>}
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'4px'}}>
                {bestM!==null&&<MBadge pct={bestM} />}
                <span style={{fontSize:'10px',color:'#9ca3af'}}>tap →</span>
              </div>
            </div>
          </Card>
        );
      })}
      {form&&<Modal title="Add New Product" onClose={()=>setForm(false)}><ProdForm rms={rms} subs={subs} onDone={()=>setForm(false)} /></Modal>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════
function Dashboard({products,variants,rms,subs,oh,onGo}) {
  // whatIfPrices: { [rmId]: newAbsolutePrice }
  const [whatIf, setWhatIf] = useState({});
  const [rmSearch, setRmSearch] = useState('');

  const varByProd = useMemo(()=>{
    const m={};
    for(const v of variants){if(!m[v.productId])m[v.productId]=[];m[v.productId].push(v);}
    return m;
  },[variants]);

  // Build simulated RM list — replace currentRate where whatIf has a value
  const simRms = useMemo(()=>
    rms.map(r=> whatIf[r.id]!==undefined && whatIf[r.id]!=='' ? {...r, currentRate:num(whatIf[r.id])} : r),
    [rms, whatIf]);

  const hasAnyWhatIf = Object.values(whatIf).some(v=>v!=='');

  // Compute base and whatif for all products
  const rows = useMemo(()=>{
    return products.map(p=>{
      const pcBase = calcProduct(p, rms, subs);
      const pcSim  = calcProduct(p, simRms, subs);
      const pvs = varByProd[p.id]||[];
      const varRows = pvs.map(v=>{
        const vcBase = calcVariant(v, pcBase, oh);
        const vcSim  = calcVariant(v, pcSim,  oh);
        return {v, vcBase, vcSim};
      });
      return {p, pcBase, varRows};
    });
  },[products, rms, simRms, subs, oh, varByProd]);

  const resetAll = ()=>setWhatIf({});

  const filteredRms = rms.filter(r=>r.name.toLowerCase().includes(rmSearch.toLowerCase()));

  if(products.length===0) return (
    <div style={{padding:'16px'}}>
      <Empty icon="🏭" text="No products yet. Add Raw Materials → Sub-Recipes → Products to get started." />
    </div>
  );

  return (
    <div style={{padding:'12px', display:'flex', flexDirection:'column', gap:'14px'}}>

      {/* ── SEGMENT 1: Product Margin Table ── */}
      <div>
        <div style={{fontSize:'10px',fontWeight:'800',color:'#9a6006',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:'8px'}}>
          📊 Segment 1 — Product Margins {hasAnyWhatIf && <span style={{color:'#a78bfa',marginLeft:'8px'}}>· What-If Active</span>}
        </div>

        {/* Table header */}
        <div style={{borderRadius:'12px',overflow:'hidden',border:'1.5px solid #e5e7eb'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 44px 68px 68px 60px 60px',background:'#1c1c2e',padding:'8px 10px',gap:'4px',alignItems:'center'}}>
            {['Product / Variant','Fill','Cur %','WI %','Cur ₹','WI ₹'].map((h,i)=>(
              <div key={h} style={{fontSize:'10px',fontWeight:'700',color:i>=2?'#a78bfa':'rgba(255,255,255,0.7)',textAlign:i===0?'left':'center'}}>{h}</div>
            ))}
          </div>

          {rows.map(({p, pcBase, varRows},pi)=>(
            <div key={p.id}>
              {/* Product name row */}
              <div style={{padding:'7px 10px',background:'#f9fafb',borderTop:'1px solid #e5e7eb',cursor:'pointer'}}
                onClick={()=>onGo(p)}>
                <span style={{fontWeight:'800',fontSize:'13px',color:'#1c1c1c'}}>{p.name}</span>
                <span style={{fontSize:'10px',color:'#9ca3af',marginLeft:'8px',textTransform:'uppercase'}}>{p.category}</span>
                {pcBase && <span style={{fontSize:'10px',color:'#e8851b',marginLeft:'8px',fontFamily:'JetBrains Mono,monospace'}}>₹{f2(pcBase.namkeenCostPerKg)}/kg</span>}
              </div>

              {/* Variant rows */}
              {varRows.map(({v, vcBase, vcSim},vi)=>{
                if(!vcBase) return null;
                const mDiff = vcSim ? vcSim.markupPct - vcBase.markupPct : 0;
                const pDiff = vcSim ? vcSim.profit - vcBase.profit : 0;
                const wiActive = hasAnyWhatIf;
                return (
                  <div key={v.id} style={{
                    display:'grid',gridTemplateColumns:'1fr 44px 68px 68px 60px 60px',
                    padding:'7px 10px',gap:'4px',alignItems:'center',
                    borderTop:'1px solid #f3f4f6',
                    background: vi%2===0?'#fff':'#fafafa'
                  }}>
                    {/* Name */}
                    <div style={{fontSize:'11px',color:'#6b7280',paddingLeft:'8px'}}>
                      <span style={{fontWeight:'700',color:'#374151'}}>₹{v.mrp}</span>
                      <span style={{marginLeft:'4px'}}>{v.packingType==='box'?'📦':'👜'}</span>
                    </div>
                    {/* Fill wt */}
                    <div style={{textAlign:'center',fontSize:'11px',color:'#6b7280',fontFamily:'JetBrains Mono,monospace'}}>{v.fillWeightG}g</div>
                    {/* Current margin */}
                    <div style={{textAlign:'center'}}>
                      <span style={{fontFamily:'JetBrains Mono,monospace',fontWeight:'800',fontSize:'12px',color:mCol(vcBase.markupPct)}}>{f1(vcBase.markupPct)}%</span>
                    </div>
                    {/* WhatIf margin */}
                    <div style={{textAlign:'center'}}>
                      {wiActive && vcSim ? (
                        <div>
                          <span style={{fontFamily:'JetBrains Mono,monospace',fontWeight:'800',fontSize:'12px',color:mCol(vcSim.markupPct)}}>{f1(vcSim.markupPct)}%</span>
                          {mDiff!==0 && <div style={{fontSize:'9px',fontFamily:'JetBrains Mono,monospace',color:mDiff>0?'#16a34a':'#dc2626',fontWeight:'700'}}>{mDiff>0?'+':''}{f1(mDiff)}%</div>}
                        </div>
                      ) : <span style={{fontSize:'11px',color:'#d1d5db'}}>—</span>}
                    </div>
                    {/* Current profit */}
                    <div style={{textAlign:'center',fontFamily:'JetBrains Mono,monospace',fontSize:'11px',fontWeight:'700',color:'#374151'}}>₹{Math.round(vcBase.profit)}</div>
                    {/* WhatIf profit */}
                    <div style={{textAlign:'center'}}>
                      {wiActive && vcSim ? (
                        <div>
                          <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:'11px',fontWeight:'700',color:mCol(vcSim.markupPct)}}>₹{Math.round(vcSim.profit)}</span>
                          {pDiff!==0 && <div style={{fontSize:'9px',fontFamily:'JetBrains Mono,monospace',color:pDiff>0?'#16a34a':'#dc2626',fontWeight:'700'}}>{pDiff>0?'+':''}{Math.round(pDiff)}</div>}
                        </div>
                      ) : <span style={{fontSize:'11px',color:'#d1d5db'}}>—</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      {/* ── SEGMENT 2: Ingredients What-If ── */}
      <div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
          <div style={{fontSize:'10px',fontWeight:'800',color:'#9a6006',letterSpacing:'1.5px',textTransform:'uppercase'}}>
            🔮 Segment 2 — What-If Ingredient Prices
          </div>
          {hasAnyWhatIf && (
            <button onClick={resetAll} style={{background:'#fee2e2',border:'none',borderRadius:'7px',padding:'5px 10px',fontSize:'11px',fontWeight:'700',color:'#dc2626',cursor:'pointer',fontFamily:'Sora,sans-serif'}}>
              Reset All
            </button>
          )}
        </div>

        <InfoBox>Type a new price in the <strong>What-If ₹</strong> column for any ingredient. Segment 1 updates instantly. Leave blank = no change. Change as many as needed simultaneously.</InfoBox>

        <div style={{marginTop:'8px',marginBottom:'8px'}}>
          <input value={rmSearch} onChange={e=>setRmSearch(e.target.value)} placeholder="Search ingredient…"
            style={{border:'1.5px solid #e5e7eb',borderRadius:'10px',padding:'9px 14px',fontSize:'13px',width:'100%'}} />
        </div>

        <div style={{borderRadius:'12px',overflow:'hidden',border:'1.5px solid #e5e7eb'}}>
          {/* Table header */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 80px 90px',background:'#1c1c2e',padding:'8px 10px',gap:'6px'}}>
            {['Ingredient','Current ₹','What-If ₹'].map((h,i)=>(
              <div key={h} style={{fontSize:'10px',fontWeight:'700',color:i===2?'#a78bfa':'rgba(255,255,255,0.7)',textAlign:i===0?'left':'right'}}>{h}</div>
            ))}
          </div>

          {filteredRms.map((rm,i)=>{
            const wiVal = whatIf[rm.id];
            const hasWI = wiVal!==undefined && wiVal!=='';
            const wiNum = hasWI ? num(wiVal) : rm.currentRate;
            const diff  = wiNum - rm.currentRate;
            return (
              <div key={rm.id} style={{
                display:'grid',gridTemplateColumns:'1fr 80px 90px',
                padding:'7px 10px',gap:'6px',alignItems:'center',
                borderTop:'1px solid #f3f4f6',
                background: hasWI ? '#fff9f0' : i%2===0?'#fff':'#fafafa',
                borderLeft: hasWI ? '3px solid #e8851b' : '3px solid transparent'
              }}>
                <div>
                  <div style={{fontWeight: hasWI?'700':'500', fontSize:'12px', color:'#1c1c1c'}}>{rm.name}</div>
                  {hasWI && diff!==0 && (
                    <div style={{fontSize:'10px',fontFamily:'JetBrains Mono,monospace',color:diff>0?'#dc2626':'#16a34a',fontWeight:'700'}}>
                      {diff>0?'+':''}{f2(diff)} ₹/kg change
                    </div>
                  )}
                </div>
                <div style={{textAlign:'right',fontFamily:'JetBrains Mono,monospace',fontWeight:'700',fontSize:'12px',color:'#374151'}}>
                  ₹{rm.currentRate}
                </div>
                <div style={{textAlign:'right'}}>
                  <input
                    type="number"
                    value={wiVal ?? ''}
                    placeholder={String(rm.currentRate)}
                    onChange={e=>setWhatIf(prev=>({...prev,[rm.id]:e.target.value}))}
                    style={{
                      width:'82px',border:`1.5px solid ${hasWI?'#e8851b':'#e5e7eb'}`,
                      borderRadius:'7px',padding:'5px 8px',fontSize:'12px',
                      textAlign:'right',fontFamily:'JetBrains Mono,monospace',
                      background: hasWI?'#fff9f0':'#fff',
                      fontWeight: hasWI?'700':'400',
                      color: hasWI?(diff>0?'#dc2626':'#16a34a'):'#374151'
                    }}
                  />
                </div>
              </div>
            );
          })}
        </div>
        {filteredRms.length===0 && <Empty icon="🔍" text="No ingredients found" />}
      </div>
    </div>
  );
}


// ═══════════════════════════════════════════════════════════════════════════
// SETTINGS / OVERHEAD
// ═══════════════════════════════════════════════════════════════════════════
function Settings({oh}) {
  const [lab,setLab]=useState('');
  const [boi,setBoi]=useState('');
  const [ele,setEle]=useState('');
  const [ind,setInd]=useState('');
  const [busy,setBusy]=useState(false);
  const [ok,setOk]=useState(false);

  useEffect(()=>{setLab(oh.labourPerKg||'');setBoi(oh.boilerFuelPerKg||'');setEle(oh.electricityPerKg||'');setInd(oh.indirectPerKg||'');},[oh]);

  const total=num(lab)+num(boi)+num(ele)+num(ind);

  const save=async()=>{
    setBusy(true);
    try{
      const rates={labourPerKg:num(lab),boilerFuelPerKg:num(boi),electricityPerKg:num(ele),indirectPerKg:num(ind)};
      await db.collection(C.OH).doc('rates').set({...rates,history:FV.arrayUnion({...rates,date:today()})},{merge:true});
      setOk(true); setTimeout(()=>setOk(false),2500);
    } finally{setBusy(false);}
  };

  const hist=(oh.history||[]).slice().reverse().slice(0,10);

  return (
    <div style={{padding:'16px',display:'flex',flexDirection:'column',gap:'16px'}}>
      <SecHdr title="Overhead Rates (₹ per kg)" />
      <InfoBox>💡 These rates are applied at final product level on every kg of finished namkeen/snack. Update monthly based on your cost analysis.</InfoBox>
      <Card>
        <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
          {[{l:'👷 Labour Cost',v:lab,s:setLab,d:'Worker wages per kg of production'},{l:'🔥 Boiler / Fuel',v:boi,s:setBoi,d:'Fuel cost for frying operations'},{l:'⚡ Electricity',v:ele,s:setEle,d:'Power consumption per kg'},{l:'📋 Indirect Overheads',v:ind,s:setInd,d:'Admin, maintenance, misc per kg'}].map(x=>(
            <div key={x.l} style={{display:'grid',gridTemplateColumns:'1fr 100px',gap:'10px',alignItems:'center'}}>
              <div>
                <div style={{fontWeight:'700',fontSize:'13px'}}>{x.l}</div>
                <div style={{fontSize:'11px',color:'#9ca3af'}}>{x.d}</div>
              </div>
              <Inp value={x.v} onChange={x.s} type="number" placeholder="₹/kg" />
            </div>
          ))}
          <div style={{borderTop:'2px solid #e8851b',paddingTop:'12px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontWeight:'800',fontSize:'14px'}}>Total Overhead</div>
              <div style={{fontSize:'11px',color:'#9ca3af'}}>Added to every kg of finished product</div>
            </div>
            <div style={{fontFamily:'JetBrains Mono,monospace',fontWeight:'800',fontSize:'20px',color:'#e8851b'}}>₹{f2(total)}/kg</div>
          </div>
          <Btn onClick={save} disabled={busy} full>{busy?'Saving…':ok?'✅ Saved!':'Save Overhead Rates'}</Btn>
        </div>
      </Card>

      {hist.length>0&&(
        <div>
          <div style={{fontSize:'10px',fontWeight:'800',color:'#9a6006',letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:'8px'}}>Rate Change History</div>
          {hist.map((h,i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:i%2===0?'#fff':'#f9fafb',borderRadius:'8px',marginBottom:'4px',fontSize:'12px'}}>
              <span style={{color:'#6b7280'}}>{h.date}</span>
              <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:'11px',color:'#374151'}}>
                L:₹{h.labourPerKg} · B:₹{h.boilerFuelPerKg} · E:₹{h.electricityPerKg} · I:₹{h.indirectPerKg}
                <span style={{fontWeight:'800',color:'#e8851b'}}> = ₹{f2(num(h.labourPerKg)+num(h.boilerFuelPerKg)+num(h.electricityPerKg)+num(h.indirectPerKg))}/kg</span>
              </span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const [tab,setTab]=useState('dashboard');
  const [rms,rmsL]     = useCol(C.RM);
  const [subs,subsL]   = useCol(C.SUB);
  const [prods,prodsL] = useCol(C.PROD);
  const [vars,varsL]   = useCol(C.VAR);
  const oh             = useOverhead();

  const loading = rmsL||subsL||prodsL||varsL;

  const navToProduct = prod => { setTab('products'); setTimeout(()=>window.__navProd&&window.__navProd(prod),50); };

  const TABS=[
    {id:'dashboard',e:'📊',l:'Dashboard'},
    {id:'ingredients',e:'🌾',l:'Ingredients'},
    {id:'subrecipes',e:'⚙️',l:'Sub-Recipes'},
    {id:'products',e:'🏭',l:'Products'},
    {id:'settings',e:'🔧',l:'Settings'},
  ];

  if(loading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f8f4ef'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:'48px',marginBottom:'12px'}}>🍘</div>
        <div style={{fontWeight:'800',color:'#e8851b',fontSize:'16px'}}>Loading Maruti Costing…</div>
        <div style={{color:'#9ca3af',fontSize:'12px',marginTop:'6px'}}>Connecting to Firebase…</div>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',background:'#f8f4ef',maxWidth:'540px',margin:'0 auto',display:'flex',flexDirection:'column'}}>
      {/* Header */}
      <div style={{background:'linear-gradient(135deg,#1c1c2e,#2d1810)',padding:'13px 16px',position:'sticky',top:0,zIndex:20}}>
        <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
          <span style={{fontSize:'22px'}}>🍘</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:'800',fontSize:'15px',color:'#fff'}}>Maruti Namkeen Costing</div>
            <div style={{fontSize:'10px',color:'#e8851b',fontWeight:'700',letterSpacing:'1px',textTransform:'uppercase'}}>
              {rms.length} RM · {subs.length} Sub-recipes · {prods.length} Products · {vars.length} Variants
            </div>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:'auto',paddingBottom:'68px'}}>
        {tab==='dashboard'   &&<Dashboard products={prods} variants={vars} rms={rms} subs={subs} oh={oh} onGo={p=>{setTab('products');}}/>}
        {tab==='ingredients' &&<RawMaterials rms={rms} />}
        {tab==='subrecipes'  &&<SubRecipes subs={subs} rms={rms} />}
        {tab==='products'    &&<Products products={prods} variants={vars} rms={rms} subs={subs} oh={oh} />}
        {tab==='settings'    &&<Settings oh={oh} />}
      </div>

      {/* Bottom Nav */}
      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:'540px',background:'#fff',borderTop:'1px solid #e5e7eb',display:'grid',gridTemplateColumns:'repeat(5,1fr)',zIndex:20}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{border:'none',background:'transparent',padding:'9px 4px',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',borderTop:tab===t.id?'3px solid #e8851b':'3px solid transparent'}}>
            <span style={{fontSize:'17px'}}>{t.e}</span>
            <span style={{fontSize:'9px',fontWeight:'700',fontFamily:'Sora,sans-serif',color:tab===t.id?'#e8851b':'#9ca3af',textTransform:'uppercase',letterSpacing:'0.4px'}}>{t.l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
